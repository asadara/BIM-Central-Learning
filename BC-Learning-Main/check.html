<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <title>Mendeteksi Server</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin-top: 100px;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <h2>Mendeteksi server aktif...</h2>
  <div class="spinner"></div>
  <p>Mohon tunggu, Anda akan diarahkan secara otomatis.</p>

  <script>
    const address = "https://bcl.nke.net";

    fetch(`${address}/ping`, { method: "GET" })
      .then(() => {
        window.location.href = address;
      })
      .catch(() => {
        document.body.innerHTML = `
          <h2>Gagal menghubungi server</h2>
          <p>Pastikan server BCL menyala dan dapat diakses dari jaringan Anda.</p>
          <p>Jika masalah berlanjut, periksa koneksi dan sertifikat HTTPS.</p>
        `;
      });
  </script>
</body>

</html>
