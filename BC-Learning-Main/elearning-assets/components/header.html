<!-- Navbar Container for E-learning Pages -->
<div id="navbar-container"></div>

<header class="header">
    <section class="flex">
        <a href="/elearning-assets/home.html" class="logo">BIM Central Learning - TRAINING CENTER</a>

        <form action="/elearning-assets/search.html" method="post" class="search-form">
            <input type="text" name="search_box" required placeholder="search courses..." maxlength="100">
            <button type="submit" class="fas fa-search"></button>
        </form>

        <div class="icons">
            <div id="menu-btn" class="fas fa-bars"></div>
            <div id="search-btn" class="fas fa-search"></div>
            <div id="user-btn" class="fas fa-user"></div>
            <div id="toggle-btn" class="fas fa-sun"></div>
        </div>

        <div class="profile">
            <img id="header-user-img" src="/elearning-assets/images/pic-1.jpg" class="image" alt="">
            <h3 class="name" id="header-user-name">Guest</h3>
            <p class="role" id="header-user-role">visitor</p>

            <!-- Untuk user yang sudah login -->
            <div id="logged-in-options" style="display: none;">
                <a href="/elearning-assets/update.html" class="btn">update profile</a>
                <a href="/elearning-assets/profile.html" class="btn">view profile</a>
                <div class="flex-btn">
                    <a href="#" id="logout-btn" class="option-btn">logout</a>
                </div>
            </div>

            <!-- Untuk user yang belum login -->
            <div id="guest-options">
                <p style="font-size: 14px; color: #666; margin: 10px 0;">Please login to access all features</p>
                <div class="flex-btn">
                    <a href="/elearning-assets/login.html" class="option-btn">login</a>
                    <a href="/elearning-assets/register.html" class="option-btn">register</a>
                </div>
            </div>
        </div>
    </section>
</header>
