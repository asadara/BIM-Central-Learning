<script>
    // Define functions immediately when sidebar loads
    console.log('Sidebar component loaded - defining content management functions');

    // Fallback handler untuk tombol main page jika component-loader tidak tersedia
    function handleMainPageClick(event) {
        event.preventDefault();

        // Coba gunakan handler dari component-loader dulu
        if (window.componentLoader && typeof window.componentLoader.handleMainPageNavigation === 'function') {
            window.componentLoader.handleMainPageNavigation();
            return;
        }

        // Fallback navigation
        const currentPath = window.location.pathname;
        let targetPath;

        if (currentPath.includes('/elearning-assets/')) {
            targetPath = '../index.html';
        } else if (currentPath.includes('/pages/')) {
            targetPath = '../index.html';
        } else {
            targetPath = '/index.html';
        }

        console.log('Main page fallback navigation from:', currentPath, 'to:', targetPath);
        window.location.href = targetPath;
    }

    // Test function to verify sidebar functions are working
    window.testSidebarFunction = function () {
        console.log('Sidebar function called successfully!');
        alert('Sidebar function works!');
    };

    // Define content management functions in sidebar for immediate availability
    window.openContentManager = function () {
        console.log('openContentManager called from sidebar');
        alert('Content Manager opened from sidebar!');

        // Create modal if it doesn't exist
        if (!document.getElementById('admin-modal')) {
            const modalHTML = `
                <div id="admin-modal" class="modal fade" tabindex="-1">
                    <div class="modal-dialog modal-lg">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="modal-title">Learning Materials Manager</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body" id="modal-body">
                                <div class="content-manager">
                                    <h4><i class="fas fa-book"></i> Learning Materials Manager</h4>
                                    <p>Content manager loaded from sidebar!</p>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                <button type="button" class="btn btn-primary" id="save-btn">Upload Material</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            console.log('Modal created from sidebar');
        }

        // Load Bootstrap if not loaded
        if (typeof bootstrap === 'undefined') {
            console.log('Loading Bootstrap from sidebar...');
            const bootstrapCSS = document.createElement('link');
            bootstrapCSS.rel = 'stylesheet';
            bootstrapCSS.href = 'https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css';
            document.head.appendChild(bootstrapCSS);

            const bootstrapJS = document.createElement('script');
            bootstrapJS.src = 'https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js';
            document.head.appendChild(bootstrapJS);
        }

        setTimeout(() => {
            if (typeof bootstrap !== 'undefined') {
                const modal = new bootstrap.Modal(document.getElementById('admin-modal'));
                modal.show();
                console.log('Modal shown from sidebar');
            } else {
                alert('Bootstrap not loaded yet, please try again');
            }
        }, 500);
    };

    window.openExamManager = function () {
        console.log('openExamManager called from sidebar');
        alert('Exam Manager opened from sidebar!');

        // Create modal if it doesn't exist
        if (!document.getElementById('admin-modal')) {
            const modalHTML = `
                <div id="admin-modal" class="modal fade" tabindex="-1">
                    <div class="modal-dialog modal-lg">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="modal-title">Exam Materials Manager</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body" id="modal-body">
                                <div class="exam-manager">
                                    <h4><i class="fas fa-clipboard-check"></i> Exam Materials Manager</h4>
                                    <p>Exam manager loaded from sidebar!</p>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                <button type="button" class="btn btn-primary" id="save-btn">Upload Exam</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            console.log('Exam modal created from sidebar');
        }

        // Load Bootstrap if not loaded
        if (typeof bootstrap === 'undefined') {
            console.log('Loading Bootstrap for exam from sidebar...');
            const bootstrapCSS = document.createElement('link');
            bootstrapCSS.rel = 'stylesheet';
            bootstrapCSS.href = 'https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css';
            document.head.appendChild(bootstrapCSS);

            const bootstrapJS = document.createElement('script');
            bootstrapJS.src = 'https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js';
            document.head.appendChild(bootstrapJS);
        }

        setTimeout(() => {
            if (typeof bootstrap !== 'undefined') {
                const modal = new bootstrap.Modal(document.getElementById('admin-modal'));
                modal.show();
                console.log('Exam modal shown from sidebar');
            } else {
                alert('Bootstrap not loaded yet, please try again');
            }
        }, 500);
    };

    console.log('Sidebar content management functions defined');
    console.log('openContentManager available:', typeof window.openContentManager);
    console.log('openExamManager available:', typeof window.openExamManager);
</script>
