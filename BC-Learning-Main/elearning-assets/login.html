<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>BIM NKE : Login</title>

   <!-- Favicon -->
   <link href="/img/icon.png" rel="icon">

   <!-- Google Web Fonts -->
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet">

   <!-- Icon Font Stylesheet -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

   <!-- Bootstrap CSS -->
   <link rel="stylesheet" href="css/bootstrap.min.css">

   <!-- custom css file link  -->
   <link rel="stylesheet" href="css/style.css">

</head>

<body class="auth-page">

   <!-- Header akan dimuat otomatis oleh component-loader.js -->
   <div class="header-container"></div>

   <!-- Sidebar -->
   <div class="side-bar" id="sidebar-container"></div>

   <!-- Simple Header -->
   <div class="text-center" style="margin-top: -40px; margin-bottom: 2rem;">
      <i class="fas fa-sign-in-alt fa-3x text-primary mb-3"></i>
   </div>

   <!-- Login Start -->
   <div class="container-xxl py-2 mt-4">
      <div class="container">
         <div class="row g-4 wow fadeInUp" data-wow-delay="0.5s ">
            <center>
               <form id="login-form" class="shadow p-4" style="max-width: 550px;">
                  <div class="text-center wow fadeInUp" data-wow-delay="0.1s">
                     <h1 class="mb-5 bg-white text-center px-3"> Log in</h1>
                  </div>
                  <div class="row g-3">
                     <div class="col-12">
                        <div class="form-floating">
                           <input type="email" class="form-control" id="email" placeholder="Email Address">
                           <label for="email">E-mail</label>
                        </div>
                     </div>
                     <div class="col-12">
                        <div class="form-floating">
                           <input type="password" class="form-control" id="password" placeholder="Password">
                           <label for="password">Password</label>
                        </div>
                     </div>
                     <div class="col-12">
                        <p><a href="#">Lupa password?</a></p>
                     </div>
                     <div class="col-12">
                        <button class="btn text-light w-100 py-3" type="submit"> Log in</button>
                     </div>
                     <div class="col-12 text-center">
                        <p>Belum punya akun BCL? <a class="text-decoration-none" href="register.html">Sign up</a></p>
                     </div>
                  </div>
               </form>
            </center>
         </div>
      </div>
   </div>
   <!-- Login End -->

   <!-- Footer akan dimuat otomatis oleh component-loader.js -->
   <div class="footer-container"></div>

   <!-- Bootstrap JS -->
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

   <!-- Core Scripts -->
   <script src="js/component-loader.js"></script>
   <script src="js/script.js"></script>
   <script src="js/sidebar-loader.js"></script>
   <script src="js/user.js"></script>
   <script src="js/page-tracker.js"></script>

</body>

</html>
