<!DOCTYPE html>
<html lang="id">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Mengalihkan ke Halaman Login BCL</title>
   <link rel="icon" href="/img/icons/trimmed/main_ico_bcl.ico" type="image/x-icon">
   <meta http-equiv="refresh" content="0; url=/pages/login.html">
   <script>
      (function redirectToUnifiedLogin() {
         const currentUrl = new URL(window.location.href);
         const existingRedirect = currentUrl.searchParams.get('redirect');
         const fallbackRedirect = localStorage.getItem('authRedirectPage') || '/elearning-assets/dashboard.html';
         const finalRedirect = existingRedirect || fallbackRedirect;
         const targetUrl = new URL('/pages/login.html', window.location.origin);

         if (finalRedirect) {
            targetUrl.searchParams.set('redirect', finalRedirect);
         }

         window.location.replace(targetUrl.toString());
      })();
   </script>
</head>
<body>
   <p>Sedang mengalihkan ke halaman login utama BCL...</p>
</body>
</html>
