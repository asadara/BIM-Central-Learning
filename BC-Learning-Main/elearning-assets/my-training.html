<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Training - BCL</title>
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://fonts.googleapis.com https://fonts.gstatic.com https://use.fontawesome.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com https://use.fontawesome.com https://cdn.jsdelivr.net; img-src 'self' data: https:; media-src 'self' https:; connect-src 'self'; frame-src 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.1.2/css/all.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .my-training-shell {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
        }

        .my-training-header {
            display: flex;
            justify-content: space-between;
            gap: 1.5rem;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .my-training-header h1 {
            color: var(--black);
            font-size: 2.4rem;
            margin: 0 0 .6rem;
        }

        .my-training-header p {
            color: #667;
            font-size: 1.35rem;
            margin: 0;
            max-width: 760px;
        }

        .my-training-summary {
            display: grid;
            grid-template-columns: repeat(3, minmax(120px, 1fr));
            gap: .8rem;
            min-width: 360px;
        }

        .summary-tile {
            background: #fff;
            border: 1px solid rgba(10, 54, 63, .1);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 12px 26px rgba(10, 54, 63, .06);
        }

        .summary-tile span {
            display: block;
            color: var(--main-color);
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
        }

        .summary-tile small {
            color: #667;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .my-training-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1rem;
        }

        .training-batch-card {
            background: #fff;
            border: 1px solid rgba(10, 54, 63, .1);
            border-radius: 8px;
            box-shadow: 0 16px 34px rgba(10, 54, 63, .08);
            padding: 1.4rem;
        }

        .batch-card-top {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: flex-start;
            margin-bottom: 1.2rem;
        }

        .batch-code {
            color: #667;
            display: block;
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: .35rem;
            text-transform: uppercase;
        }

        .batch-card-top h3 {
            color: var(--black);
            font-size: 1.55rem;
            margin: 0;
        }

        .batch-status {
            border-radius: 999px;
            color: #fff;
            font-size: .9rem;
            font-weight: 800;
            padding: .35rem .65rem;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .status-active {
            background: #198754;
        }

        .status-completed {
            background: #0d6efd;
        }

        .status-archived {
            background: #343a40;
        }

        .status-draft {
            background: #6c757d;
        }

        .batch-meta {
            display: grid;
            gap: .65rem;
            color: #4c6268;
            font-size: 1.2rem;
            margin-bottom: 1.2rem;
        }

        .batch-meta div,
        .batch-roster-line span {
            align-items: center;
            display: inline-flex;
            gap: .55rem;
        }

        .batch-meta i,
        .batch-roster-line i {
            color: var(--main-color);
            width: 18px;
        }

        .batch-roster-line {
            display: flex;
            flex-wrap: wrap;
            gap: .85rem;
            color: #667;
            font-size: 1.05rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(10, 54, 63, .08);
        }

        .batch-card-footer {
            align-items: center;
            display: flex;
            gap: .75rem;
            justify-content: space-between;
            color: #74858a;
            font-size: 1.05rem;
            margin-top: 1rem;
        }

        .my-training-empty {
            background: #fff;
            border: 1px solid rgba(10, 54, 63, .1);
            border-radius: 8px;
            color: #667;
            padding: 3rem 1.5rem;
            text-align: center;
        }

        .my-training-empty i {
            color: var(--main-color);
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .my-training-empty h3 {
            color: var(--black);
            font-size: 1.7rem;
        }

        .training-action {
            background: var(--main-color);
            border: 0;
            border-radius: 8px;
            color: #fff;
            display: inline-block;
            font-size: 1.2rem;
            font-weight: 700;
            padding: .75rem 1.1rem;
            text-decoration: none;
        }

        .training-plan-button {
            align-items: center;
            background: var(--main-color);
            border: 0;
            border-radius: 8px;
            color: #fff;
            display: inline-flex;
            flex: 0 0 auto;
            gap: .45rem;
            font-size: 1.05rem;
            font-weight: 800;
            padding: .65rem .9rem;
        }

        .training-plan-button:hover {
            filter: brightness(.95);
        }

        .training-plan-button.is-active {
            background: #0a363f;
        }

        .training-plan-panel {
            background: #fff;
            border: 1px solid rgba(10, 54, 63, .1);
            border-radius: 8px;
            box-shadow: 0 16px 34px rgba(10, 54, 63, .08);
            margin-top: 1.25rem;
            padding: 1.5rem;
        }

        .training-plan-panel.is-hidden {
            display: none;
        }

        .training-plan-head {
            align-items: flex-start;
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            margin-bottom: 1.25rem;
        }

        .training-plan-head h2 {
            color: var(--black);
            font-size: 1.8rem;
            margin: 0 0 .35rem;
        }

        .training-plan-head p {
            color: #667;
            font-size: 1.1rem;
            margin: 0;
        }

        .training-plan-close {
            align-items: center;
            background: #f1f5f6;
            border: 1px solid rgba(10, 54, 63, .12);
            border-radius: 8px;
            color: #0a363f;
            display: inline-flex;
            height: 38px;
            justify-content: center;
            width: 38px;
        }

        .training-topic-list {
            display: grid;
            gap: 1rem;
        }

        .training-topic {
            border: 1px solid rgba(10, 54, 63, .1);
            border-radius: 8px;
            overflow: hidden;
        }

        .training-topic-title {
            background: #f8fbfc;
            border-bottom: 1px solid rgba(10, 54, 63, .08);
            padding: 1rem;
        }

        .training-topic-title h3 {
            color: var(--black);
            font-size: 1.35rem;
            margin: 0 0 .35rem;
        }

        .training-topic-title p {
            color: #667;
            font-size: 1.05rem;
            margin: 0;
        }

        .training-plan-item {
            align-items: flex-start;
            display: grid;
            gap: .85rem;
            grid-template-columns: minmax(0, 1fr) auto;
            padding: 1rem;
        }

        .training-plan-item + .training-plan-item {
            border-top: 1px solid rgba(10, 54, 63, .08);
        }

        .training-plan-item h4 {
            color: #0a363f;
            font-size: 1.18rem;
            margin: 0 0 .35rem;
        }

        .training-plan-item p {
            color: #5d7076;
            font-size: 1.02rem;
            margin: 0;
        }

        .training-item-meta {
            display: flex;
            flex-wrap: wrap;
            gap: .55rem;
            margin-top: .65rem;
        }

        .training-item-pill {
            align-items: center;
            background: #eef6f7;
            border-radius: 999px;
            color: #0a363f;
            display: inline-flex;
            gap: .35rem;
            font-size: .9rem;
            font-weight: 800;
            padding: .35rem .6rem;
            text-transform: uppercase;
        }

        .training-item-actions {
            align-items: flex-start;
            display: flex;
            justify-content: flex-end;
        }

        .training-action-secondary {
            background: #eef6f7;
            border: 1px solid rgba(10, 54, 63, .14);
            color: #0a363f;
        }

        .practice-submission-status {
            align-items: center;
            border-radius: 999px;
            display: inline-flex;
            gap: .4rem;
            font-size: .95rem;
            font-weight: 800;
            margin-top: .7rem;
            padding: .35rem .65rem;
        }

        .submission-status-ok {
            background: #e8f6ee;
            color: #146c43;
        }

        .submission-status-alert {
            background: #fff3cd;
            color: #8a6200;
        }

        .submission-status-returned {
            background: #f8d7da;
            color: #842029;
        }

        .submission-status-muted {
            background: #eef2f5;
            color: #4c6268;
        }

        .practice-modal-backdrop {
            align-items: center;
            background: rgba(10, 20, 24, .48);
            display: flex;
            inset: 0;
            justify-content: center;
            padding: 1rem;
            position: fixed;
            z-index: 3000;
        }

        .practice-modal {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 24px 70px rgba(10, 20, 24, .26);
            max-height: min(92vh, 780px);
            max-width: 720px;
            overflow: auto;
            width: 100%;
        }

        .practice-modal-header {
            align-items: flex-start;
            border-bottom: 1px solid rgba(10, 54, 63, .1);
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            padding: 1.25rem;
        }

        .practice-modal-header h3 {
            color: var(--black);
            font-size: 1.45rem;
            margin: 0 0 .3rem;
        }

        .practice-modal-header p,
        .practice-submission-summary {
            color: #667;
            margin: 0;
        }

        .practice-modal-body {
            padding: 1.25rem;
        }

        .practice-submission-summary {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            gap: .65rem;
            margin-bottom: 1rem;
        }

        .practice-submission-instructions {
            background: #f8fbfc;
            border: 1px solid rgba(10, 54, 63, .09);
            border-radius: 8px;
            color: #4c6268;
            font-size: 1.02rem;
            margin-bottom: 1rem;
            padding: .85rem;
            white-space: pre-wrap;
        }

        .practice-review-feedback {
            background: #e8f6ee;
            border: 1px solid rgba(20, 108, 67, .18);
            border-radius: 8px;
            color: #146c43;
            margin-bottom: 1rem;
            padding: .85rem;
        }

        .practice-review-feedback p {
            color: #146c43;
            margin: .35rem 0 0;
            white-space: pre-wrap;
        }

        .practice-field {
            display: grid;
            gap: .4rem;
            margin-bottom: .9rem;
        }

        .practice-field span {
            color: #0a363f;
            font-weight: 800;
        }

        .practice-field input,
        .practice-field textarea {
            border: 1px solid rgba(10, 54, 63, .18);
            border-radius: 8px;
            color: #223;
            font-size: 1rem;
            padding: .7rem .8rem;
            width: 100%;
        }

        .practice-existing-files {
            border-top: 1px solid rgba(10, 54, 63, .1);
            color: #4c6268;
            display: grid;
            gap: .55rem;
            margin-top: 1rem;
            padding-top: 1rem;
        }

        .practice-existing-files div {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            gap: .45rem;
        }

        .practice-existing-files small {
            color: #667;
            flex-basis: 100%;
        }

        .practice-modal-footer {
            border-top: 1px solid rgba(10, 54, 63, .1);
            display: flex;
            gap: .75rem;
            justify-content: flex-end;
            margin-top: 1.2rem;
            padding-top: 1rem;
        }

        @media (max-width: 768px) {
            .my-training-header {
                display: block;
            }

            .my-training-summary {
                grid-template-columns: repeat(3, 1fr);
                min-width: 0;
                margin-top: 1rem;
            }

            .batch-card-footer,
            .training-plan-head,
            .training-plan-item {
                display: block;
            }

            .training-plan-button,
            .training-plan-close {
                margin-top: .75rem;
            }

            .practice-modal-footer {
                display: grid;
            }
        }
    </style>
</head>

<body>
    <div class="header-container"></div>
    <div class="side-bar" id="sidebar-container"></div>

    <main class="my-training-shell">
        <section class="my-training-header">
            <div>
                <h1>My Training</h1>
                <p>Daftar training batch yang Anda ikuti di BCL. Halaman ini menjadi pintu masuk untuk Training Plan, Practice Task, feedback mentor, dan evaluasi batch pada fase berikutnya.</p>
            </div>
            <div class="my-training-summary" id="my-training-summary">
                <div class="summary-tile"><span>0</span><small>Total Batch</small></div>
                <div class="summary-tile"><span>0</span><small>Active</small></div>
                <div class="summary-tile"><span>0</span><small>Completed</small></div>
            </div>
        </section>

        <section id="my-training-content">
            <div class="my-training-empty">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Memuat training batch...</p>
            </div>
        </section>

        <section id="my-training-plan-panel" class="training-plan-panel is-hidden"></section>
    </main>

    <div class="footer-container"></div>

    <script src="js/component-loader.js"></script>
    <script src="js/script.js"></script>
    <script src="js/sidebar-loader.js"></script>
    <script src="js/my-training.js"></script>
</body>

</html>
