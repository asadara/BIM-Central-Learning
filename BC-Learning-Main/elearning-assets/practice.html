<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Questions - BC Learning</title>

    <!-- Security Headers (fixed for FontAwesome compatibility) -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://fonts.googleapis.com https://fonts.gstatic.com https://use.fontawesome.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com https://use.fontawesome.com https://cdn.jsdelivr.net; img-src 'self' data: https:; media-src 'self' https:; connect-src 'self' http://localhost:5051 ws://localhost:5051; frame-src 'self' http://localhost:5051;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

    <!-- font awesome cdn link - Alternative CDN -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.1.2/css/all.css">

    <!-- custom css file link  -->
    <link rel="stylesheet" href="../css/bootstrap.min.css"><link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header akan dimuat otomatis oleh component-loader.js -->
    <div class="header-container"></div>

    <div class="side-bar" id="sidebar-container"></div>

    <section class="practice">
        <h1 class="heading">Practice Questions</h1>

        <!-- Search Bar -->
        <div class="search-bar" style="margin-bottom: 2rem;">
            <div class="search-input" style="max-width: 500px; margin: 0 auto;">
                <input type="text" id="practice-search" placeholder="Search practice questions..."
                    style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px;">
                <i class="fas fa-search"
                    style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #666;"></i>
            </div>
        </div>

        <!-- Practice Sets -->
        <div class="practice-sets">
            <div class="box-container" id="practice-container">
                <!-- Practice sets will be loaded dynamically -->
            </div>
        </div>

        <!-- Quiz Modal -->
        <div class="quiz-modal" id="quiz-modal">
            <div class="quiz-content">
                <div class="quiz-header">
                    <h3 id="quiz-title">Practice Quiz</h3>
                    <div class="quiz-info">
                        <span id="question-counter">1 / 10</span>
                        <span id="timer">05:00</span>
                    </div>
                    <button class="close-quiz" id="close-quiz">&times;</button>
                </div>

                <div class="quiz-body">
                    <div class="question" id="current-question">
                        <div id="question-image-container" style="display: none; margin-bottom: 1rem; text-align: center;">
                            <img id="question-image" src="" alt="Question Image"
                                style="max-width: 100%; max-height: 300px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                        </div>
                        <h4 id="question-text">Question will appear here</h4>
                        <div class="options" id="options-container">
                            <!-- Options will be loaded dynamically -->
                        </div>
                    </div>
                </div>

                <div class="quiz-footer">
                    <button class="btn prev-btn" id="prev-btn" disabled>Previous</button>
                    <button class="btn next-btn" id="next-btn">Next</button>
                    <button class="btn submit-btn" id="submit-btn" style="display: none;">Submit Quiz</button>
                </div>
            </div>
        </div>

        <!-- Results Modal -->
        <div class="results-modal" id="results-modal">
            <div class="results-content">
                <div class="results-header">
                    <h3>Quiz Results</h3>
                    <button class="close-results" id="close-results">&times;</button>
                </div>

                <div class="results-body">
                    <div class="score-display">
                        <div class="score-circle">
                            <span id="final-score">0%</span>
                        </div>
                        <h4 id="score-message">Good job!</h4>
                    </div>

                    <div class="results-details">
                        <div class="detail-item">
                            <span>Correct Answers:</span>
                            <span id="correct-count">0</span>
                        </div>
                        <div class="detail-item">
                            <span>Wrong Answers:</span>
                            <span id="wrong-count">0</span>
                        </div>
                        <div class="detail-item">
                            <span>Time Taken:</span>
                            <span id="time-taken">00:00</span>
                        </div>
                    </div>

                    <div class="results-actions">
                        <button class="btn" id="review-btn">Review Answers</button>
                        <button class="btn" id="retry-btn">Try Again</button>
                        <button class="btn" id="next-level-btn" style="display: none;">Next Level</button>
                    </div>
                </div>
            </div>
        </div>

    </section>

    <!-- Footer akan dimuat otomatis oleh component-loader.js -->
    <div class="footer-container"></div>

    <!-- Core Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script><script src="js/component-loader.js"></script>
    <script src="js/script.js"></script>
    <script src="js/sidebar-loader.js"></script>
    <script src="js/practice.js"></script>
    <script src="../js/user.js"></script>
    <script src="../js/page-tracker.js"></script>

</body>

</html>
