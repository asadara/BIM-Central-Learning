<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencarian Lanjutan</title>
    <link rel="icon" href="/img/icon.png">
    <link rel="preconnect" href="//fonts.googleapis.com">
    <link rel="preconnect" href="//fonts.gstatic.com" crossorigin>
    <link href="//fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        td:nth-child(2),
        td:nth-child(4) {
            text-align: left !important;
        }
    </style>
</head>
<body>
    <div class="header-container"></div>
    <div class="side-bar" id="sidebar-container"></div>

    <section class="search-page elearn-page-shell">
        <div class="elearn-page-intro">
            <p class="elearn-page-kicker">Explorer</p>
            <h1 class="heading">Eksplorasi Data BIM NKE</h1>
            <p class="elearn-page-copy">
                Cari file, video, model, dan dokumen BIM dari satu panel yang lebih nyaman dipakai di desktop maupun layar kecil.
            </p>
        </div>

        <div class="elearn-surface search-toolbar-panel">
            <div class="search-controls">
                <input type="text" id="searchInput" class="form-control" placeholder="Cari file atau folder...">
                <select id="filterType" class="form-select">
                    <option value="all">Semua Kategori</option>
                    <option value="pdf">PDF</option>
                    <option value="video">Video</option>
                    <option value="text">Teks</option>
                    <option value="rvt">Revit (.rvt)</option>
                    <option value="dwg">CAD (.dwg)</option>
                    <option value="rfa">Revit Family (.rfa)</option>
                    <option value="pln">ArchiCad (.pln)</option>
                    <option value="skp">SketchUp (.skp)</option>
                    <option value="tm">Twinmotion (.tm)</option>
                </select>
                <button id="searchButton" class="btn btn-primary" type="button" onclick="startSearch()">Cari</button>
            </div>

            <div id="loading" class="text-center mt-4" style="display: none;">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3 mb-0">Memproses pencarian...</p>
            </div>
        </div>

        <div class="elearn-surface search-results-panel">
            <div class="search-meta">
                <p id="fileCount" class="fw-bold">Jumlah file ditemukan: 0</p>
            </div>

            <div class="table-responsive">
                <table id="resultTable" class="table table-bordered">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama File</th>
                            <th>Jenis</th>
                            <th>Lokasi File</th>
                            <th class="file-size">Ukuran</th>
                            <th>Update</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="searchResults"></tbody>
                </table>
            </div>
        </div>
    </section>

    <div id="file-list"></div>
    <div class="footer-container"></div>

    <script>
        sessionStorage.setItem("lastPage", window.location.href);
    </script>
    <script src="./js/advancesearch.js"></script>
    <script src="//code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/component-loader.js"></script>
    <script src="js/script.js"></script>
    <script src="js/sidebar-loader.js"></script>
</body>
</html>
