    <!-- Custom E-Learning JavaScript -->
    <script>
        // Global variables
        let allCourses = [];
        let allVideos = [];
        let currentPage = 1;
        let visibleCourses = [];
        let courseLookup = new Map();
        const videoExplorerState = {
            query: '',
            category: 'all',
            sort: 'popular'
        };
        const itemsPerPage = 12;

        function getApiCandidates(path) {
            const candidates = [path];
            const { protocol, hostname, origin } = window.location;
            const isHttp = protocol === 'http:' || protocol === 'https:';

            if (isHttp && origin) {
                candidates.push(`${origin}${path}`);
            }

            if (hostname && isHttp) {
                candidates.push(`${protocol}//${hostname}:5052${path}`);
            }

            candidates.push(`${window.location.protocol}//localhost:5052${path}`);
            return [...new Set(candidates)];
        }

        async function fetchJsonWithFallback(path) {
            let lastError = null;

            for (const url of getApiCandidates(path)) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    return await response.json();
                } catch (error) {
                    lastError = error;
                }
            }

            throw lastError || new Error(`Failed to fetch ${path}`);
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function () {
            loadElearningContent();
            initializeEventListeners();
        });

        // Main function to load all content
        async function loadElearningContent() {
            showLoadingState();

            try {
                // Load courses and videos in parallel
                const [coursesResult, videosResult] = await Promise.all([
                    fetchCourses(),
                    fetchVideos()
                ]);

                visibleCourses = coursesResult;
                allVideos = videosResult;

                // Display content
                displayCourses(visibleCourses);
                renderVideoExplorer();

                hideLoadingState();

            } catch (error) {
                console.error('Failed to load elearning content:', error);
                showErrorState(error);
            }
        }

        // Fetch courses from backend
        async function fetchCourses() {
            try {
                const courses = await fetchJsonWithFallback('/api/courses');
                allCourses = courses;
                courseLookup = new Map(courses.map((course) => [course.id, course]));
                return courses;
            } catch (error) {
                console.error('Error fetching courses:', error);
                return [];
            }
        }

        // Fetch videos from backend
        async function fetchVideos() {
            try {
                const videos = await fetchJsonWithFallback('/api/tutorials');
                // Remove the 20 video limit - load all videos
                return videos;
            } catch (error) {
                console.error('Error fetching videos:', error);
                return [];
            }
        }

        function toCategoryKey(value) {
            return String(value || '')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '');
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getCourseInfoByKey(categoryKey) {
            return courseLookup.get(categoryKey) || null;
        }

        function getExplorerCategoryInfo(video) {
            const categoryKey = toCategoryKey(video.categoryKey || video.category);
            const course = getCourseInfoByKey(categoryKey);
            if (course) {
                return {
                    key: categoryKey,
                    label: course.title || course.category || video.category || 'Other',
                    icon: course.icon || 'fas fa-play-circle'
                };
            }

            const fallback = detectVideoCategory(video.name);
            return {
                key: categoryKey || 'other',
                label: video.category || fallback.name,
                icon: fallback.icon
            };
        }

        function getQueryFilteredVideos() {
            const query = videoExplorerState.query.trim().toLowerCase();
            if (!query) {
                return [...allVideos];
            }

            return allVideos.filter((video) => {
                const categoryInfo = getExplorerCategoryInfo(video);
                return video.name.toLowerCase().includes(query) ||
                    String(video.category || '').toLowerCase().includes(query) ||
                    categoryInfo.label.toLowerCase().includes(query);
            });
        }

        function sortExplorerVideos(videos) {
            const sortedVideos = [...videos];

            if (videoExplorerState.sort === 'name-asc') {
                sortedVideos.sort((left, right) => left.name.localeCompare(right.name));
                return sortedVideos;
            }

            if (videoExplorerState.sort === 'category') {
                sortedVideos.sort((left, right) => {
                    const leftCategory = getExplorerCategoryInfo(left).label;
                    const rightCategory = getExplorerCategoryInfo(right).label;
                    return leftCategory.localeCompare(rightCategory) || left.name.localeCompare(right.name);
                });
                return sortedVideos;
            }

            sortedVideos.sort((left, right) => {
                const leftViews = Number(left.viewCount || 0);
                const rightViews = Number(right.viewCount || 0);
                return rightViews - leftViews || left.name.localeCompare(right.name);
            });

            return sortedVideos;
        }

        function getVisibleVideos() {
            const queryFilteredVideos = getQueryFilteredVideos();
            const categoryFilteredVideos = videoExplorerState.category === 'all'
                ? queryFilteredVideos
                : queryFilteredVideos.filter((video) => getExplorerCategoryInfo(video).key === videoExplorerState.category);

            return sortExplorerVideos(categoryFilteredVideos);
        }

        function renderExplorerStats(queryFilteredVideos, visibleVideos) {
            const statsContainer = document.getElementById('videoExplorerStats');
            if (!statsContainer) return;

            const topCategoryEntry = Object.entries(queryFilteredVideos.reduce((accumulator, video) => {
                const info = getExplorerCategoryInfo(video);
                accumulator[info.label] = (accumulator[info.label] || 0) + 1;
                return accumulator;
            }, {})).sort((left, right) => right[1] - left[1])[0];

            const topVideo = [...queryFilteredVideos].sort((left, right) => {
                const leftViews = Number(left.viewCount || 0);
                const rightViews = Number(right.viewCount || 0);
                return rightViews - leftViews || left.name.localeCompare(right.name);
            })[0];

            const cards = [
                {
                    label: 'Video Aktif',
                    value: visibleVideos.length,
                    meta: `${allVideos.length} total video tersedia`
                },
                {
                    label: 'Kategori Aktif',
                    value: new Set(queryFilteredVideos.map((video) => getExplorerCategoryInfo(video).key)).size,
                    meta: topCategoryEntry ? `Terpadat: ${topCategoryEntry[0]} (${topCategoryEntry[1]})` : 'Belum ada kategori'
                },
                {
                    label: 'Kursus Tampil',
                    value: visibleCourses.length,
                    meta: `${allCourses.length} total cluster materi`
                },
                {
                    label: 'Paling Populer',
                    value: Number(topVideo?.viewCount || 0),
                    meta: topVideo ? topVideo.name : 'Belum ada data view'
                }
            ];

            statsContainer.innerHTML = cards.map((card) => `
                <div class="col-lg-3 col-md-6">
                    <div class="video-explorer-stat">
                        <div class="stat-label">${card.label}</div>
                        <div class="stat-value">${card.value}</div>
                        <div class="stat-meta">${card.meta}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderCategoryChips(queryFilteredVideos) {
            const chipContainer = document.getElementById('videoCategoryChips');
            if (!chipContainer) return;

            const categoryCounts = new Map();
            queryFilteredVideos.forEach((video) => {
                const info = getExplorerCategoryInfo(video);
                categoryCounts.set(info.key, {
                    key: info.key,
                    label: info.label,
                    count: (categoryCounts.get(info.key)?.count || 0) + 1
                });
            });

            const categories = [{
                key: 'all',
                label: 'Semua',
                count: queryFilteredVideos.length
            }, ...[...categoryCounts.values()].sort((left, right) => {
                return right.count - left.count || left.label.localeCompare(right.label);
            })];

            chipContainer.innerHTML = '';
            categories.forEach((category) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = `video-category-chip${videoExplorerState.category === category.key ? ' active' : ''}`;
                button.innerHTML = `${category.label} <span class="ms-1">(${category.count})</span>`;
                button.addEventListener('click', () => {
                    videoExplorerState.category = category.key;
                    currentPage = 1;
                    renderVideoExplorer();
                });
                chipContainer.appendChild(button);
            });
        }

        function updateSearchSummary(totalVisibleVideos) {
            const summaryElement = document.getElementById('searchResults');
            if (!summaryElement) return;

            const safeQuery = escapeHtml(videoExplorerState.query);
            const queryLabel = videoExplorerState.query ? `untuk pencarian "<strong>${safeQuery}</strong>"` : 'tanpa filter kata kunci';
            const categoryLabel = videoExplorerState.category !== 'all'
                ? `Kategori aktif: <strong>${escapeHtml(getCourseInfoByKey(videoExplorerState.category)?.title || videoExplorerState.category)}</strong>`
                : 'Kategori aktif: <strong>Semua</strong>';

            summaryElement.innerHTML = `
                <span>Menampilkan <strong>${totalVisibleVideos}</strong> video cepat dan <strong>${visibleCourses.length}</strong> kursus ${queryLabel}.</span>
                <span>${categoryLabel}</span>
            `;
        }

        function renderVideoExplorer() {
            const queryFilteredVideos = getQueryFilteredVideos();
            renderCategoryChips(queryFilteredVideos);

            const visibleVideos = getVisibleVideos();
            const totalPages = Math.max(1, Math.ceil(visibleVideos.length / itemsPerPage));
            if (currentPage > totalPages) {
                currentPage = 1;
            }

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const videosForPage = visibleVideos.slice(startIndex, endIndex);

            renderExplorerStats(queryFilteredVideos, visibleVideos);
            displayVideos(videosForPage, startIndex + 1);
            updatePaginationControls(visibleVideos.length);
            updateSearchSummary(visibleVideos.length);
        }

        function updatePaginationControls(totalItems) {
            const container = document.getElementById('pagination-container');
            if (!container) return;

            const totalPages = Math.max(1, Math.ceil(totalItems / itemsPerPage));
            if (totalItems <= itemsPerPage) {
                container.innerHTML = `<div class="text-muted small">Menampilkan semua video terpilih pada satu halaman.</div>`;
                return;
            }

            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);

            let pagesMarkup = `
                <button class="btn btn-outline-primary btn-sm" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                    <i class="fas fa-chevron-left me-1"></i>Sebelumnya
                </button>
            `;

            for (let page = startPage; page <= endPage; page += 1) {
                pagesMarkup += `<button class="btn ${page === currentPage ? 'btn-primary' : 'btn-outline-primary'} btn-sm" onclick="changePage(${page})">${page}</button>`;
            }

            pagesMarkup += `
                <button class="btn btn-outline-primary btn-sm" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                    Berikutnya<i class="fas fa-chevron-right ms-1"></i>
                </button>
            `;

            container.innerHTML = `
                <div class="text-muted small">Halaman ${currentPage} dari ${totalPages}</div>
                <div class="explorer-pagination-pages">${pagesMarkup}</div>
            `;
        }

        function changePage(page) {
            const totalPages = Math.max(1, Math.ceil(getVisibleVideos().length / itemsPerPage));
            if (page < 1 || page > totalPages) return;

            currentPage = page;
            renderVideoExplorer();

            const explorer = document.getElementById('tutorialExplorer');
            if (explorer) {
                explorer.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // Display courses section
        function displayCourses(courses) {
            let coursesGrid = document.getElementById('coursesGrid');

            // Create courses section if it doesn't exist
            if (!coursesGrid) {
                const coursesSection = document.createElement('div');
                coursesSection.className = 'container mt-5';
                coursesSection.innerHTML = `
                    <h3 class="text-center mb-4">
                        <i class="fas fa-graduation-cap text-primary me-2"></i>
                        Kategori Pembelajaran BIM
                    </h3>
                    <div class="row g-4" id="coursesGrid"></div>
                `;

                // Insert after the existing container
                const existingContainer = document.querySelector('.container.text-center.my-2');
                existingContainer.insertAdjacentElement('afterend', coursesSection);
                coursesGrid = document.getElementById('coursesGrid');
            }

            // Clear existing content and add filtered courses
            coursesGrid.innerHTML = '';
            courses.forEach(course => {
                const courseCard = createCourseCard(course);
                coursesGrid.appendChild(courseCard);
            });
        }

        function getCourseThumbnail(course) {
            if (course && typeof course.thumbnail === 'string' && course.thumbnail.trim()) {
                return course.thumbnail;
            }

            return '../img/fallback-thumb.png';
        }

        // Create course card
        function createCourseCard(course) {
            const card = document.createElement('div');
            card.className = 'col-lg-3 col-md-4 col-sm-6';
            card.innerHTML = `
                <div class="card course-card h-100">
                    <img src="${getCourseThumbnail(course)}" class="course-thumbnail card-img-top"
                         alt="${course.title}" onerror="this.src='../img/fallback-thumb.png'">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">${course.title}</h5>
                        <p class="card-text flex-grow-1">${course.description}</p>
                        <div class="mt-auto">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <small class="text-muted">
                                    <i class="fas fa-play-circle me-1"></i>
                                    ${course.videoCount || 0} Videos
                                </small>
                                <span class="badge bg-primary">${course.icon ? '<i class="' + course.icon + '"></i>' : '🎓'}</span>
                            </div>
                            <button class="btn btn-primary w-100" onclick="openCourse('${course.id}')">
                                <i class="fas fa-eye me-2"></i>Lihat Kursus
                            </button>
                        </div>
                    </div>
                </div>
            `;
            return card;
        }

        function truncatePath(pathValue) {
            const normalizedPath = String(pathValue || '').replace(/\//g, ' / ');
            if (normalizedPath.length <= 88) {
                return normalizedPath;
            }

            return `${normalizedPath.slice(0, 85)}...`;
        }

        function createVideoCard(video) {
            const categoryInfo = getExplorerCategoryInfo(video);
            const column = document.createElement('div');
            column.className = 'col-xl-3 col-lg-4 col-md-6';

            const card = document.createElement('div');
            card.className = 'card explore-video-card';

            const thumbnailWrap = document.createElement('div');
            thumbnailWrap.className = 'explore-video-thumb-wrap';
            thumbnailWrap.addEventListener('click', () => playVideo(video.id, video.path));

            const thumbnail = document.createElement('img');
            thumbnail.className = 'explore-video-thumb';
            thumbnail.src = video.thumbnail || '../img/fallback-thumb.png';
            thumbnail.alt = video.name;
            thumbnail.onerror = function () {
                this.src = '../img/fallback-thumb.png';
            };

            const badge = document.createElement('div');
            badge.className = 'explore-video-badge';
            badge.innerHTML = `<i class="${categoryInfo.icon}"></i>${categoryInfo.label}`;

            const playButton = document.createElement('button');
            playButton.type = 'button';
            playButton.className = 'explore-video-play';
            playButton.innerHTML = '<i class="fas fa-play"></i>';
            playButton.addEventListener('click', (event) => {
                event.stopPropagation();
                playVideo(video.id, video.path);
            });

            thumbnailWrap.appendChild(thumbnail);
            thumbnailWrap.appendChild(badge);
            thumbnailWrap.appendChild(playButton);

            const body = document.createElement('div');
            body.className = 'card-body d-flex flex-column';

            const title = document.createElement('div');
            title.className = 'explore-video-title';
            title.title = video.name;
            title.textContent = video.name;

            const meta = document.createElement('div');
            meta.className = 'explore-video-meta';
            meta.innerHTML = `
                <span><i class="fas fa-eye me-1"></i>${Number(video.viewCount || 0)} views</span>
                <span><i class="fas fa-file-video me-1"></i>${video.size || '-'}</span>
            `;

            const pathText = document.createElement('div');
            pathText.className = 'explore-video-path';
            pathText.textContent = truncatePath(video.path);

            const actions = document.createElement('div');
            actions.className = 'd-flex gap-2 mt-auto pt-3';

            const playAction = document.createElement('button');
            playAction.type = 'button';
            playAction.className = 'btn btn-primary btn-sm flex-fill';
            playAction.innerHTML = '<i class="fas fa-play me-1"></i>Putar';
            playAction.addEventListener('click', () => playVideo(video.id, video.path));

            const categoryAction = document.createElement('button');
            categoryAction.type = 'button';
            categoryAction.className = 'btn btn-outline-secondary btn-sm flex-fill';
            categoryAction.innerHTML = '<i class="fas fa-layer-group me-1"></i>Kategori';
            categoryAction.addEventListener('click', () => openCourse(categoryInfo.key));

            actions.appendChild(playAction);
            actions.appendChild(categoryAction);

            body.appendChild(title);
            body.appendChild(meta);
            body.appendChild(pathText);
            body.appendChild(actions);

            card.appendChild(thumbnailWrap);
            card.appendChild(body);
            column.appendChild(card);

            return column;
        }

        function displayVideos(videos) {
            const videoList = document.getElementById('videoList');
            videoList.innerHTML = '';

            if (videos.length === 0) {
                videoList.innerHTML = `
                    <div class="col-12">
                        <div class="explorer-empty-state">
                            <h6 class="mb-2">Belum ada video yang cocok</h6>
                            <p class="text-muted mb-3">Coba ubah kata kunci pencarian atau pilih kategori lain untuk melihat rekomendasi video.</p>
                            <button type="button" class="btn btn-outline-primary btn-sm" onclick="resetVideoExplorerFilters()">
                                Reset Filter Explorer
                            </button>
                        </div>
                    </div>
                `;
                return;
            }

            videos.forEach((video) => {
                videoList.appendChild(createVideoCard(video));
            });
        }

        // Initialize event listeners
        function initializeEventListeners() {
            const sortSelect = document.getElementById('videoSortMode');
            if (sortSelect) {
                sortSelect.addEventListener('change', (event) => {
                    videoExplorerState.sort = event.target.value;
                    currentPage = 1;
                    renderVideoExplorer();
                });
            }

            // Search function
            window.searchFiles = function () {
                const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
                videoExplorerState.query = searchTerm;
                currentPage = 1;

                if (!searchTerm) {
                    visibleCourses = allCourses;
                    displayCourses(visibleCourses);
                    renderVideoExplorer();
                    return;
                }

                visibleCourses = allCourses.filter(course =>
                    course.title.toLowerCase().includes(searchTerm) ||
                    course.description.toLowerCase().includes(searchTerm) ||
                    String(course.category || '').toLowerCase().includes(searchTerm)
                );

                displayCourses(visibleCourses);
                renderVideoExplorer();
            };

            window.resetVideoExplorerFilters = function () {
                videoExplorerState.query = '';
                videoExplorerState.category = 'all';
                videoExplorerState.sort = 'popular';
                currentPage = 1;
                visibleCourses = allCourses;
                document.getElementById('searchInput').value = '';
                if (sortSelect) {
                    sortSelect.value = 'popular';
                }
                displayCourses(visibleCourses);
                renderVideoExplorer();
            };

            // Course opening function
            window.openCourse = function (courseId) {
                const course = allCourses.find(c => c.id === courseId);
                if (course) {
                    window.location.href = `tutorial.html?category=${encodeURIComponent(course.id)}`;
                } else {
                    alert('Kursus tidak ditemukan.');
                }
            };

            // Video playing function
            window.playVideo = function (videoId, videoPath) {
                // Use the same video player from tutorials page
                if (typeof playVideoFullscreen === 'function') {
                    playVideoFullscreen(videoId, videoPath);
                } else {
                    window.open(`/api/video-stream/${encodeURIComponent(videoPath.replace(/^\/videos\//, ''))}`, '_blank');
                }
            };
        }

        // Utility functions
        function showLoadingState() {
            document.getElementById('videoList').innerHTML = `
                <div class="col-12">
                    <div class="loading-spinner">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Memuat materi pembelajaran...</p>
                    </div>
                </div>
            `;
        }

        function hideLoadingState() {
            // Loading state will be replaced when content is displayed
        }

        function showErrorState(error) {
            document.getElementById('videoList').innerHTML = `
                <div class="col-12">
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <strong>Gagal memuat konten!</strong>
                        <p class="mb-0 mt-2">${error.message}</p>
                        <p class="mb-0">Periksa koneksi server dan coba refresh halaman.</p>
                    </div>
                </div>
            `;
        }

        // Navigation functions
        window.goBack = function () {
            window.history.back();
        };

        // Simple dropdown toggle function
        window.toggleDropdown = function () {
            const content = document.getElementById('dropdownContent');
            if (content) {
                content.classList.toggle('show');
            }
        };

        // Close dropdown when clicking outside
        document.addEventListener('click', function (event) {
            const dropdown = document.querySelector('.simple-dropdown');
            const content = document.getElementById('dropdownContent');
            if (dropdown && content && !dropdown.contains(event.target)) {
                content.classList.remove('show');
            }
        });

        // Helper function to detect video category
        function detectVideoCategory(filename) {
            const name = filename.toLowerCase();

            // Check for most specific software names first
            if (name.includes('archicad') || name.includes('archi-cad') || name.includes('gs-')) {
                return { name: 'ArchiCAD', icon: 'fas fa-home' };
            }
            if (name.includes('navisworks') || name.includes('nwd') || name.includes('nw-')) {
                return { name: 'Navisworks', icon: 'fas fa-project-diagram' };
            }
            if (name.includes('enscape') || name.includes('en-')) {
                return { name: 'Enscape', icon: 'fas fa-camera' };
            }
            if (name.includes('lumion') || name.includes('lm-')) {
                return { name: 'Lumion', icon: 'fas fa-palette' };
            }
            if (name.includes('dynamo') || name.includes('dy-')) {
                return { name: 'Dynamo', icon: 'fas fa-code-branch' };
            }
            if (name.includes('civil') || name.includes('infraworks') || name.includes('civil-3d') || name.includes('c3d')) {
                return { name: 'Civil 3D', icon: 'fas fa-road' };
            }
            if (name.includes('revit') || name.includes('rvt') || name.includes('rv-')) {
                return { name: 'Revit BIM', icon: 'fas fa-building' };
            }
            if (name.includes('autocad') || name.includes('acad') || name.includes('dwg') || name.includes('ac-')) {
                return { name: 'AutoCAD', icon: 'fas fa-drafting-compass' };
            }

            // General BIM-related keywords (checked last)
            if (name.includes('bim') || name.includes('building information') || name.includes('modeling')) {
                return { name: 'General BIM', icon: 'fas fa-cubes' };
            }

            // Check for other common software
            if (name.includes('sketchup') || name.includes('sketch-up') || name.includes('skp')) {
                return { name: 'SketchUp', icon: 'fas fa-cube' };
            }
            if (name.includes('rhino') || name.includes('rhinoceros') || name.includes('3dm')) {
                return { name: 'Rhino 3D', icon: 'fas fa-shapes' };
            }
            if (name.includes('blender') || name.includes('blend')) {
                return { name: 'Blender', icon: 'fas fa-magic' };
            }
            if (name.includes('maya') || name.includes('autodesk maya')) {
                return { name: 'Maya', icon: 'fas fa-film' };
            }

            // Tutorial and general content
            if (name.includes('tutorial') || name.includes('training') || name.includes('course')) {
                return { name: 'Tutorials', icon: 'fas fa-graduation-cap' };
            }
            if (name.includes('workflow') || name.includes('process') || name.includes('method')) {
                return { name: 'Workflow', icon: 'fas fa-stream' };
            }

            return { name: 'Other Tutorials', icon: 'fas fa-video' };
        }

        // Jika user pindah ke dashboard, simpan halaman ini
        sessionStorage.setItem("lastPageFromPages", window.location.pathname);
    </script>
