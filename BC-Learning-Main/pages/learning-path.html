<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jalur Belajar BCL</title>
    <link rel="icon" href="/img/icons/trimmed/main_ico_bcl.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css">
    <link rel="stylesheet" href="../elearning-assets/css/style.css">
</head>

<body>

    <!-- Header akan dimuat otomatis oleh component-loader.js -->
    <div class="header-container"></div>

    <!-- Sidebar akan dimuat otomatis oleh component-loader.js -->
    <div class="sidebar-container"></div>

    <section class="home-grid">
        <h1 class="heading">opsi cepat</h1>
        <div class="box-container">
            <div class="box">
                <h3 class="title">Progres</h3>
                <p class="likes">Modul Selesai : <span id="completed-count">0</span></p>
                <a href="#" class="inline-btn">lihat progres</a>
            </div>
            <div class="box">
                <h3 class="title">Kategori Utama</h3>
                <div class="flex">
                    <a href="#"><i class="fas fa-code"></i><span>BIM</span></a>
                    <a href="#"><i class="fas fa-cube"></i><span>CAD</span></a>
                    <a href="#"><i class="fas fa-building"></i><span>Proyek</span></a>
                    <a href="#"><i class="fas fa-chart-line"></i><span>Manajemen</span></a>
                </div>
            </div>
            <div class="box">
                <h3 class="title">Topik Populer</h3>
                <div class="flex">
                    <a href="#"><i class="fab fa-html5"></i><span>IFC</span></a>
                    <a href="#"><i class="fab fa-js"></i><span>Otomasi</span></a>
                    <a href="#"><i class="fab fa-php"></i><span>API</span></a>
                    <a href="#"><i class="fab fa-bootstrap"></i><span>Visualisasi</span></a>
                </div>
            </div>
            <div class="box">
                <h3 class="title">Menjadi Tutor</h3>
                <p class="tutor">Bergabunglah menjadi kontributor konten BCL!</p>
                <a href="#" class="inline-btn">mulai sekarang</a>
            </div>
        </div>
    </section>

    <section class="courses">
        <h1 class="heading">jalur belajar</h1>
        <div class="box-container" id="modules-list">Memuat modul...</div>
        <div class="more-btn">
        </div>
    </section>

    <!-- Footer akan dimuat otomatis oleh component-loader.js -->
    <div class="footer-container"></div>

    <!-- custom js file link  -->
    <script src="../elearning-assets/js/component-loader.js"></script>
    <script src="../elearning-assets/js/script.js"></script>
    <script src="../js/learning-path.js"></script>
</body>

</html>
