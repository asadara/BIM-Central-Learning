    <!-- Icon Font Stylesheet -->

    <!-- Customized Bootstrap Stylesheet -->

    <!-- Template Stylesheet -->
    <link href="../css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #6c757d;
            font-size: 0.875rem;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #dee2e6;
        }

        .google-auth-wrap {
            display: flex;
            justify-content: center;

        }

<body>

    <!-- Navbar Start -->
    <div id="navbar-container"></div>
    <!-- Navbar End -->

    <!-- Simple Header -->
    <div class="text-center" style="margin-top: -40px; margin-bottom: 2rem;">
        <i class="fas fa-sign-in-alt fa-3x text-primary mb-3"></i>
    </div>


    <!-- Login Start -->
    <div class="container-xxl py-2 mt-4">
        <div class="container">
            <div class="row g-4 wow fadeInUp" data-wow-delay="0.5s ">
                <center>
                    <form id="login-form" class="shadow p-4" style="max-width: 550px;">
                        <div class="text-center wow fadeInUp" data-wow-delay="0.1s">
                            <h1 class="mb-5 bg-white text-center px-3"> Log in</h1>
                        </div>
                        <div class="row g-3">
                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="email" class="form-control" id="email" placeholder="Email Address">
                                    <label for="email">E-mail</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="password" class="form-control" id="password" placeholder="Password">
                                    <label for="password">Password</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <p><a href="#">Lupa password?</a></p>
                            </div>
                            <div class="col-12">
                                <button class="btn text-light w-100 py-3" type="submit"> Log in</button>
                            </div>
                            <div class="col-12">
                                <div class="auth-divider">atau</div>
                            </div>
                            <div class="col-12">
                                <div id="google-login-wrap" class="google-auth-wrap"></div>
                                <div id="google-login-note" class="google-auth-note mt-2"></div>
                            </div>
                            <div class="col-12 text-center">
                                <p>Belum punya akun BCL? <a class="text-decoration-none" href="signup.html">Sign up</a>
                                </p>
                            </div>
                        </div>
                    </form>
                </center>
            </div>
        </div>
    </div>
    <!-- Login End -->


    <!-- Footer Start -->
    <div id="footer-container"></div>
    <!-- Footer End -->


    <!-- Back to Top -->
    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>


    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../lib/wow/wow.min.js"></script>
    <script src="../lib/easing/easing.min.js"></script>
    <script src="../lib/waypoints/waypoints.min.js"></script>
    <script src="../lib/owlcarousel/owl.carousel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Template Javascript -->
    <script src="../js/main.js"></script>
    <script src="../js/user.js"></script>
    <script src="../js/loadComponents.js"></script>

    <script>
        let googleLoginInitialized = false;

        async function initGoogleLogin() {
            const noteEl = document.getElementById('google-login-note');
            const container = document.getElementById('google-login-wrap');

            if (!container || googleLoginInitialized) return;

            if (!window.google || !window.google.accounts || !window.google.accounts.id) {
                setTimeout(initGoogleLogin, 300);
                return;
            }

            try {
                const configRes = await fetch('/api/auth/google/config');
                const config = await configRes.json();

                if (!configRes.ok || !config.success || !config.enabled || !config.clientId) {
                    noteEl.textContent = 'Login with Google belum tersedia.';
                    return;
                }

                window.google.accounts.id.initialize({
                    client_id: config.clientId,
                    callback: handleGoogleLoginResponse,
                    auto_select: false,
                    cancel_on_tap_outside: true
                });

                window.google.accounts.id.renderButton(container, {
                    theme: 'outline',
                    size: 'large',
                    type: 'standard',
                    text: 'signin_with',
                    shape: 'rectangular',
                    width: 280
                });

                googleLoginInitialized = true;
                noteEl.textContent = '';
            } catch (error) {
                console.error('Google login init error:', error);
                noteEl.textContent = 'Gagal memuat Google Login. Coba lagi nanti.';
            }
        }

        async function handleGoogleLoginResponse(response) {
            const credential = response && response.credential ? response.credential : '';
            if (!credential) {
                alert('Google credential tidak valid. Coba lagi.');
                return;
            }

            try {
                const res = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'login',
                        idToken: credential
                    })
                });

                const data = await res.json();

                if (!res.ok || !data.success || !data.token) {
                    alert(data.error || 'Login with Google gagal.');
                    return;
                }

                const user = {
                    name: data.name || data.username || 'Google User',
                    email: data.email || '',
                    role: data.role || 'BIM Specialist',
                    photo: data.photo || data.profileImage || '/img/user-default.png',
                    token: data.token,
                    bimLevel: data.bimLevel,
                    organization: data.organization
                };

                if (typeof setUserData === 'function') {
                    setUserData(user);
                } else {
                    localStorage.setItem('user', JSON.stringify(user));
                    localStorage.setItem('username', user.name);
                    localStorage.setItem('email', user.email);
                    localStorage.setItem('role', user.role);
                    localStorage.setItem('userimg', user.photo);
                    localStorage.setItem('token', user.token);
                }

                const lastPage = localStorage.getItem('lastPage') || '/elearning-assets/dashboard.html';
                alert(data.message || 'Login with Google berhasil.');
                window.location.href = lastPage;
            } catch (error) {
                console.error('Google login error:', error);
                alert('Gagal terhubung ke server saat login dengan Google.');
            }
        }

        document.addEventListener('DOMContentLoaded', initGoogleLogin);
    </script>

</body>

</html>
