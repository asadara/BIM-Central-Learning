<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>BIM NKE : Manual Book</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="Manual book BIM NKE berdasarkan topik dan tema." name="description">

    <link href="/img/icons/icon_bcl.ico?v=20260313c" rel="icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&family=Nunito:wght@700;800&display=swap"
        rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../lib/animate/animate.min.css" rel="stylesheet">
    <link href="../lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">

    <style>
        :root {
            --manual-ink: #16213d;
            --manual-accent: #f97316;
            --manual-accent-soft: #fff1e8;
            --manual-surface: #ffffff;
            --manual-surface-alt: #f4f7fb;
            --manual-line: rgba(22, 33, 61, 0.12);
            --manual-shadow: 0 18px 40px rgba(21, 32, 62, 0.08);
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(249, 115, 22, 0.12), transparent 30%),
                linear-gradient(180deg, #fffaf6 0%, #f5f8fc 42%, #ffffff 100%);
        }

        .manual-shell {
            padding: 10px 0 64px;
        }

        .manual-toolbar {
            margin-top: 8px;
            padding: 12px 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: var(--manual-shadow);
            backdrop-filter: blur(12px);
        }

        .manual-toolbar-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(220px, 280px);
            gap: 10px;
            align-items: center;
        }

        .manual-search-wrap {
            position: relative;
        }

        .manual-search-wrap i {
            position: absolute;
            top: 50%;
            left: 18px;
            transform: translateY(-50%);
            color: #64748b;
        }

        .manual-search {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border-radius: 16px;
            border: 1px solid var(--manual-line);
            background: #fff;
            color: var(--manual-ink);
            font-size: 0.95rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .manual-search:focus {
            outline: none;
            border-color: rgba(249, 115, 22, 0.65);
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.12);
        }

        .manual-topic-select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 16px;
            border: 1px solid var(--manual-line);
            background: #fff;
            color: var(--manual-ink);
            font-size: 0.92rem;
            font-weight: 600;
        }

        .manual-topic-select:focus {
            outline: none;
            border-color: rgba(249, 115, 22, 0.65);
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.12);
        }

        .manual-results-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin: 18px 0 14px;
        }

        .manual-results-bar h2 {
            margin: 0;
            color: var(--manual-ink);
            font-size: clamp(1.4rem, 2vw, 1.9rem);
        }

        .manual-results-bar p {
            margin: 0;
            color: #64748b;
        }

        .manual-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        .manual-topic-card {
            display: flex;
            flex-direction: column;
            gap: 14px;
            height: 100%;
            padding: 22px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: var(--manual-shadow);
        }

        .manual-topic-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            min-height: 74px;
        }

        .manual-topic-heading {
            min-height: 74px;
        }

        .manual-topic-index {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 46px;
            height: 46px;
            border-radius: 14px;
            background: var(--manual-accent-soft);
            color: var(--manual-accent);
            font-weight: 800;
        }

        .manual-topic-title {
            margin: 0;
            color: var(--manual-ink);
            font-size: 1.35rem;
            line-height: 1.2;
        }

        .manual-topic-subtitle {
            margin: 6px 0 0;
            color: #64748b;
            font-size: 0.94rem;
        }

        .manual-topic-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-content: flex-start;
            min-height: 72px;
        }

        .manual-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 11px;
            border-radius: 999px;
            background: #eef4fb;
            color: #36506f;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            line-height: 1.2;
        }

        .manual-file-list {
            display: grid;
            gap: 12px;
            align-content: start;
        }

        .manual-file-list-preview {
            min-height: 156px;
            flex: 1 0 auto;
        }

        .manual-file-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 16px;
            min-height: 72px;
            border-radius: 18px;
            background: var(--manual-surface-alt);
            color: var(--manual-ink);
            text-decoration: none;
            border: 1px solid transparent;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .manual-file-link:hover {
            color: var(--manual-ink);
            transform: translateY(-2px);
            border-color: rgba(249, 115, 22, 0.24);
            box-shadow: 0 12px 26px rgba(22, 33, 61, 0.08);
        }

        .manual-file-meta {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            min-width: 0;
        }

        .manual-file-icon {
            flex: 0 0 auto;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(249, 115, 22, 0.12);
            color: var(--manual-accent);
        }

        .manual-file-text {
            min-width: 0;
        }

        .manual-file-text strong {
            display: block;
            color: var(--manual-ink);
            font-size: 0.95rem;
            line-height: 1.35;
            word-break: break-word;
        }

        .manual-file-text span {
            display: block;
            margin-top: 4px;
            color: #64748b;
            font-size: 0.82rem;
        }

        .manual-open-label {
            flex: 0 0 auto;
            color: var(--manual-accent);
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .manual-topic-footer {
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding-top: 4px;
        }

        .manual-file-count-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: #eef4fb;
            color: #36506f;
            font-size: 0.82rem;
            font-weight: 700;
        }

        .manual-file-more {
            margin-top: 0;
        }

        .manual-file-more[open] {
            width: 100%;
        }

        .manual-more-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 9px 14px;
            border-radius: 999px;
            background: var(--manual-accent-soft);
            color: var(--manual-accent);
            font-size: 0.84rem;
            font-weight: 700;
            cursor: pointer;
            list-style: none;
            width: 100%;
        }

        .manual-more-toggle::-webkit-details-marker {
            display: none;
        }

        .manual-file-more[open] .manual-more-toggle {
            margin-bottom: 12px;
        }

        .manual-loading,
        .manual-empty,
        .manual-error {
            padding: 36px 28px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: var(--manual-shadow);
            text-align: center;
        }

        .manual-loading i,
        .manual-empty i,
        .manual-error i {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .manual-error {
            color: #9f1239;
        }

        @media (max-width: 991.98px) {
            .manual-toolbar-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 575.98px) {
            .manual-shell {
                padding-top: 8px;
            }

            .manual-toolbar,
            .manual-topic-card {
                padding: 16px;
                border-radius: 18px;
            }

            .manual-topic-top,
            .manual-topic-heading,
            .manual-topic-tags,
            .manual-file-list-preview {
                min-height: 0;
            }

            .manual-topic-footer {
                flex-direction: column;
                align-items: stretch;
            }

            .manual-toolbar-grid {
                gap: 8px;
            }

            .manual-results-bar {
                flex-direction: column;
                align-items: flex-start;
            }

            .manual-file-link {
                align-items: flex-start;
            }

            .manual-file-list-preview {
                min-height: 0;
            }
        }
    </style>
</head>

<body>
    <div id="navbar-container"></div>

    <div class="page-title-header">
        <h1><i class="fas fa-book-open me-3"></i>Manual Book</h1>
        <p>Navigasi manual book BIM NKE berdasarkan topik agar materi lebih cepat ditemukan</p>
    </div>

    <div class="container-xxl manual-shell">
        <div class="container">
            <section class="manual-toolbar wow fadeInUp" data-wow-delay="0.1s">
                <div class="manual-toolbar-grid">
                    <div class="manual-search-wrap">
                        <i class="fas fa-search"></i>
                        <input id="manual-search-input" class="manual-search" type="search"
                            placeholder="Cari tema, keyword, atau nama file manual book">
                    </div>
                    <select id="manual-topic-select" class="manual-topic-select" aria-label="Pilih topik manual book">
                        <option value="all">Pilih topik populer atau yang tersedia</option>
                    </select>
                </div>
            </section>

            <section class="manual-results-bar">
                <div>
                    <h2>Daftar Tema Manual Book</h2>
                    <p id="manual-results-copy">Memuat tema manual book...</p>
                </div>
            </section>

            <section id="manual-books-content">
                <div class="manual-loading">
                    <i class="fas fa-spinner fa-spin text-primary"></i>
                    <p class="mb-0">Mengambil daftar manual book dari direktori sumber.</p>
                </div>
            </section>
        </div>
    </div>

    <div id="footer-container"></div>

    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../lib/wow/wow.min.js"></script>
    <script src="../lib/easing/easing.min.js"></script>
    <script src="../lib/waypoints/waypoints.min.js"></script>
    <script src="../lib/owlcarousel/owl.carousel.min.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script src="../js/manual-books.js?v=20260421e"></script>
</body>

</html>
