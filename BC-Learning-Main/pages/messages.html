<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <title>Pesan Masuk - BIM Central Learning</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="Inbox pesan BCL untuk komunikasi user dengan admin" name="description">

    <link href="/img/icons/icon_bcl.ico?v=20260313c" rel="icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../lib/animate/animate.min.css" rel="stylesheet">
    <link href="../lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css?v=20260518b" rel="stylesheet">

    <style>
        :root {
            --messages-ink: #18233f;
            --messages-muted: #64748b;
            --messages-line: rgba(24, 35, 63, 0.12);
            --messages-surface: #ffffff;
            --messages-soft: #f5f8fc;
            --messages-accent: #fb873f;
        }

        body {
            background: linear-gradient(180deg, #f4f7fb 0%, #ffffff 100%);
        }

        .messages-shell {
            padding: 18px 0 72px;
        }

        .messages-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 18px;
            padding: 28px 0 18px;
            border-bottom: 1px solid var(--messages-line);
        }

        .messages-header h1 {
            margin: 0;
            color: var(--messages-ink);
            font-family: "Nunito", sans-serif;
            font-size: clamp(2rem, 3vw, 3.1rem);
            font-weight: 800;
            letter-spacing: 0;
        }

        .messages-header p {
            margin: 8px 0 0;
            max-width: 680px;
            color: var(--messages-muted);
        }

        .messages-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border-radius: 999px;
            background: #fff;
            border: 1px solid var(--messages-line);
            color: var(--messages-ink);
            font-weight: 700;
            white-space: nowrap;
        }

        .messages-workspace {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(320px, 420px);
            gap: 24px;
            margin-top: 24px;
            align-items: start;
        }

        .messages-thread {
            min-height: 460px;
            padding: 24px;
            border-radius: 18px;
            background: var(--messages-surface);
            border: 1px solid var(--messages-line);
            box-shadow: 0 18px 42px rgba(24, 35, 63, 0.08);
        }

        .messages-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: 62vh;
            overflow-y: auto;
            padding-right: 6px;
        }

        .message-row {
            display: flex;
        }

        .message-row.is-admin {
            justify-content: flex-start;
        }

        .message-row.is-user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: min(720px, 82%);
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid var(--messages-line);
            color: var(--messages-ink);
            background: var(--messages-soft);
        }

        .message-row.is-user .message-bubble {
            background: #1f2a44;
            color: #fff;
            border-color: #1f2a44;
        }

        .message-meta {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
            font-size: 0.82rem;
            font-weight: 700;
            opacity: 0.78;
        }

        .message-body {
            white-space: pre-wrap;
            line-height: 1.55;
        }

        .messages-compose {
            padding: 22px;
            border-radius: 18px;
            background: #fff;
            border: 1px solid var(--messages-line);
            box-shadow: 0 18px 42px rgba(24, 35, 63, 0.08);
        }

        .messages-compose h2 {
            margin: 0 0 8px;
            color: var(--messages-ink);
            font-size: 1.25rem;
            font-weight: 800;
        }

        .messages-compose p {
            color: var(--messages-muted);
            margin-bottom: 18px;
        }

        .messages-empty,
        .messages-loading {
            min-height: 360px;
            display: grid;
            place-items: center;
            text-align: center;
            color: var(--messages-muted);
        }

        @media (max-width: 991.98px) {
            .messages-header {
                align-items: flex-start;
                flex-direction: column;
            }

            .messages-workspace {
                grid-template-columns: 1fr;
            }

            .message-bubble {
                max-width: 92%;
            }
        }
    </style>
</head>

<body>
    <div id="navbar-container"></div>

    <main class="container messages-shell">
        <header class="messages-header">
            <div>
                <h1>Pesan Masuk</h1>
                <p>Ruang komunikasi langsung antara Anda dan admin BCL untuk pemberitahuan, tindak lanjut akses, dan pertanyaan layanan.</p>
            </div>
            <div class="messages-status" id="messagesUnreadStatus">
                <i class="fas fa-envelope-open-text"></i>
                <span>Memuat pesan</span>
            </div>
        </header>

        <section class="messages-workspace">
            <div class="messages-thread">
                <div id="messagesList" class="messages-loading">
                    <div>
                        <i class="fas fa-spinner fa-spin fa-2x mb-3 text-primary"></i>
                        <p class="mb-0">Memuat inbox Anda...</p>
                    </div>
                </div>
            </div>

            <aside class="messages-compose">
                <h2>Balas Admin</h2>
                <p>Pesan Anda akan masuk ke inbox admin dan tetap tercatat di thread ini.</p>
                <form id="messageReplyForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="messageSubject">Subjek</label>
                        <input type="text" class="form-control" id="messageSubject" value="Balasan User BCL">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="messageBody">Pesan</label>
                        <textarea class="form-control" id="messageBody" rows="7" placeholder="Tulis pesan Anda..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="fas fa-paper-plane me-2"></i>Kirim Balasan
                    </button>
                </form>
            </aside>
        </section>
    </main>

    <div id="footer-container"></div>

    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top" aria-label="Kembali ke atas"><i class="bi bi-arrow-up"></i></a>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../lib/wow/wow.min.js"></script>
    <script src="../lib/easing/easing.min.js"></script>
    <script src="../lib/waypoints/waypoints.min.js"></script>
    <script src="../lib/owlcarousel/owl.carousel.min.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/user.js?v=20260604a"></script>
    <script src="../js/loadComponents.js?v=20260604a"></script>
    <script src="../js/messages.js?v=20260604a"></script>
</body>

</html>
