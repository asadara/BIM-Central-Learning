<body>

    <!-- Navbar Start -->
    <div id="navbar-container"></div>
    <!-- Navbar End -->

    <div class="container mt-4">
        <h2 class="mb-3">📄 Daftar Modul PDF</h2>
        <p>Pilih dokumen PDF untuk membaca atau mengunduh.</p>

        <!-- Input Pencarian & Sortir -->
        <div class="d-flex mb-3 gap-2 flex-wrap responsive-toolbar">
            <input type="text" id="searchInput" class="form-control w-25" placeholder="Cari dokumen..."
                onkeyup="searchPDFs()">
            <button class="btn btn-primary" onclick="searchPDFs()">🔍 Cari</button>
            <select id="sortFilter" class="form-select w-25" onchange="sortPDFs()">
                <option value="name-asc">Nama (A-Z)</option>
                <option value="name-desc">Nama (Z-A)</option>
                <option value="size-asc">Ukuran (Kecil → Besar)</option>
                <option value="size-desc">Ukuran (Besar → Kecil)</option>
            </select>
        </div>

        <p id="searchResults">Hasil ditemukan: 0</p>

        <!-- Container Daftar PDF -->
        <div id="pdfContainer" class="row row-cols-1 row-cols-md-3 g-3">
            <!-- Daftar PDF akan dimuat di sini -->
        </div>

        <!-- Tempat menampilkan daftar PDF -->
        <div id="pdfList"></div>

        <!-- Preview PDF -->
        <div id="previewContainer" class="mt-4" style="display: none;">
            <h4>📂 Preview Dokumen</h4>
            <iframe id="previewFrame" width="100%" height="500px" style="border: 1px solid #ccc;"></iframe>
            <button class="btn btn-danger mt-2" onclick="closePreview()">Tutup</button>
        </div>

        <!-- Preview PDF -->
        <div id="previewContainer" class="mt-4" style="display: none;">
            <h4>📂 Preview Dokumen</h4>
            <iframe id="previewFrame" width="100%" height="500px" style="border: 1px solid #ccc;"></iframe>
            <button class="btn btn-danger mt-2" onclick="closePreview()">Tutup</button>
        </div>
    </div>

    <script src="../js/pdf.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


    <!-- Footer Start -->
    <div id="footer-container"></div>
