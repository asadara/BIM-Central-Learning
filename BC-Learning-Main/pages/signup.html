<!DOCTYPE html>
<html lang="en">
<!-- This is now the centralized registration form - both systems use this page -->

<head>
    <meta charset="utf-8">
    <title>BIM NKE : Sign up</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="/img/icon.png" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="../lib/animate/animate.min.css" rel="stylesheet">
    <link href="../lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="../css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="../css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        .level-description {
            margin-top: 0.5rem;
            padding: 0.5rem;
            border-radius: 0.375rem;
            background-color: rgba(6, 187, 204, 0.1);
            border-left: 3px solid var(--bs-info);
            transition: all 0.3s ease;
        }

        .level-description small {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #bim-level {
            font-weight: 500;
        }

        #bim-level option {
            padding: 1rem;
        }

        .form-floating>.form-select {
            padding-top: 1.625rem;
            padding-bottom: 0.625rem;
        }

        .btn[disabled] {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .fa-spinner {
            animation: spin 1s linear infinite;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #6c757d;
            font-size: 0.875rem;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #dee2e6;
        }

        .google-auth-wrap {
            display: flex;
            justify-content: center;
            min-height: 44px;
        }

        .google-auth-note {
            font-size: 0.85rem;
            color: #6c757d;
            text-align: center;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>

</head>

<body>

    <!-- Navbar Start -->
    <div id="navbar-container"></div>
    <!-- Navbar End -->

    <!-- Simple Header -->
    <div class="text-center" style="margin-top: -40px; margin-bottom: 2rem;">
        <i class="fas fa-user-plus fa-3x text-success mb-3"></i>
    </div>


    <!-- Signup Start -->
    <div class="container-xxl py-2 mt-4">
        <div class="container">
            <div class="row g-4 wow fadeInUp" data-wow-delay="0.5s ">
                <center>
                    <form id="signup-form" class="shadow p-4" style="max-width: 550px;">
                        <div class="text-center wow fadeInUp" data-wow-delay="0.1s">
                            <h1 class="mb-5 bg-white text-center px-3">Signup</h1>

                        </div>
                        <div class="row g-3">
                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="username" placeholder="Username">
                                    <label for="username">Username</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="email" class="form-control" id="email" placeholder="Email Address">
                                    <label for="email">Email Address</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="password" class="form-control" id="password" placeholder="Password">
                                    <label for="password">Password</label>
                                </div>
                            </div>

                            <!-- BIM Level Selection -->
                            <div class="col-12">
                                <div class="form-floating">
                                    <select class="form-select" id="bim-level" required>
                                        <option value="">Choose your BIM level</option>
                                        <option value="BIM Modeller">BIM Modeller (Beginner)</option>
                                        <option value="BIM Coordinator">BIM Coordinator (Intermediate)</option>
                                        <option value="BIM Manager">BIM Manager (Advanced)</option>
                                    </select>
                                    <label for="bim-level">BIM Experience Level</label>
                                </div>
                                <div class="level-description mt-2" id="level-description">
                                    <small class="text-muted">Select your current BIM experience level to get
                                        personalized learning content.</small>
                                </div>
                            </div>

                            <!-- Job Role (Optional) -->
                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="job-role" placeholder="Job Role">
                                    <label for="job-role">Job Role (Optional)</label>
                                </div>
                            </div>

                            <!-- Organization (Optional) -->
                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="organization"
                                        placeholder="Organization">
                                    <label for="organization">Organization (Optional)</label>
                                </div>
                            </div>

                            <div class="col-12">
                                <button class="btn text-light w-100 py-3" type="submit" id="signup-btn">Create
                                    Account</button>
                            </div>

                            <div class="col-12">
                                <div class="auth-divider">atau</div>
                            </div>

                            <div class="col-12">
                                <div id="google-signup-wrap" class="google-auth-wrap"></div>
                                <div id="google-signup-note" class="google-auth-note mt-2"></div>
                            </div>

                            <div class="col-12 text-center">
                                <p>Sudah punya akun BCL? <a class="text-decoration-none" href="login.html">Login</a>
                                </p>
                            </div>
                        </div>
                    </form>
                </center>
            </div>
        </div>
    </div>
    <!-- Signup End -->


    <!-- Footer Start -->
    <div id="footer-container"></div>
    <!-- Footer End -->


    <!-- Back to Top -->
    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>


    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../lib/wow/wow.min.js"></script>
    <script src="../lib/easing/easing.min.js"></script>
    <script src="../lib/waypoints/waypoints.min.js"></script>
    <script src="../lib/owlcarousel/owl.carousel.min.js"></script>

    <!-- Template Javascript -->
    <script src="../js/main.js"></script>

    <script src="../js/loadComponents.js"></script>
    <script src="../js/user.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
        // BIM Level descriptions
        const levelDescriptions = {
            'BIM Modeller': 'Perfect for beginners! Start with basic BIM modeling tools and fundamental concepts.',
            'BIM Coordinator': 'For intermediate users who want to learn coordination workflows and clash detection.',
            'BIM Manager': 'Advanced level for project leaders focused on BIM strategy and implementation.'
        };
        let googleSignupInitialized = false;

        // Update level description when selection changes
        document.getElementById('bim-level').addEventListener('change', function () {
            const selectedLevel = this.value;
            const descriptionDiv = document.getElementById('level-description');

            if (selectedLevel && levelDescriptions[selectedLevel]) {
                descriptionDiv.innerHTML = `<small class="text-info"><i class="fas fa-info-circle"></i> ${levelDescriptions[selectedLevel]}</small>`;
            } else {
                descriptionDiv.innerHTML = '<small class="text-muted">Select your current BIM experience level to get personalized learning content.</small>';
            }
        });

        document.getElementById('signup-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const bimLevel = document.getElementById('bim-level').value;
            const jobRole = document.getElementById('job-role').value.trim();
            const organization = document.getElementById('organization').value.trim();

            // Validation
            if (!username || !email || !password || !bimLevel) {
                alert('Please fill in all required fields including BIM level.');
                return;
            }

            if (password.length < 6) {
                alert('Password must be at least 6 characters long.');
                return;
            }

            const signupBtn = document.getElementById('signup-btn');
            signupBtn.disabled = true;
            signupBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';

            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        password,
                        bimLevel,
                        jobRole: jobRole || null,
                        organization: organization || null,
                        registrationDate: new Date().toISOString(),
                        progress: {
                            coursesCompleted: 0,
                            practiceAttempts: 0,
                            examsPassed: 0,
                            certificatesEarned: 0,
                            currentLevel: bimLevel,
                            toNextLevel: bimLevel === 'BIM Modeller' ? 0 : null
                        }
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    alert(data.message || 'Account created successfully! Welcome to BC Learning.');

                    // Store user state consistently (shared between pages & e-learning)
                    const userData = {
                        name: username,
                        email: email,
                        level: bimLevel,
                        role: jobRole || 'BIM Specialist',
                        organization: organization || '',
                        progress: {
                            coursesCompleted: 0,
                            practiceAttempts: 0,
                            examsPassed: 0,
                            certificatesEarned: 0
                        }
                    };
                    localStorage.setItem('userData', JSON.stringify(userData));

                    const normalizedUser = {
                        name: username,
                        email: email,
                        role: jobRole || 'BIM Specialist',
                        photo: '/img/user-default.png',
                        token: data.token || ''
                    };

                    if (typeof setUserData === 'function') {
                        setUserData(normalizedUser);
                    } else {
                        localStorage.setItem('user', JSON.stringify(normalizedUser));
                        localStorage.setItem('username', normalizedUser.name);
                        localStorage.setItem('email', normalizedUser.email);
                        localStorage.setItem('role', normalizedUser.role);
                        localStorage.setItem('userimg', normalizedUser.photo);
                        localStorage.setItem('token', normalizedUser.token);
                    }

                    // Redirect to appropriate starting page based on level
                    if (bimLevel === 'BIM Modeller') {
                        window.location.href = '/elearning-assets/courses.html?level=beginner';
                    } else if (bimLevel === 'BIM Coordinator') {
                        window.location.href = '/elearning-assets/courses.html?level=intermediate';
                    } else {
                        window.location.href = '/elearning-assets/dashboard.html';
                    }
                } else {
                    alert(data.error || 'Signup failed! Please try again.');
                }
            } catch (err) {
                console.error('Signup error:', err);
                alert('Failed to connect to server. Please check your connection and try again.');
            } finally {
                signupBtn.disabled = false;
                signupBtn.innerHTML = 'Create Account';
            }
        });

        async function initGoogleSignup() {
            const noteEl = document.getElementById('google-signup-note');
            const container = document.getElementById('google-signup-wrap');

            if (!container || googleSignupInitialized) return;

            if (!window.google || !window.google.accounts || !window.google.accounts.id) {
                setTimeout(initGoogleSignup, 300);
                return;
            }

            try {
                const configRes = await fetch('/api/auth/google/config');
                const config = await configRes.json();

                if (!configRes.ok || !config.success || !config.enabled || !config.clientId) {
                    noteEl.textContent = 'Sign up with Google belum tersedia.';
                    return;
                }

                window.google.accounts.id.initialize({
                    client_id: config.clientId,
                    callback: handleGoogleSignupResponse,
                    auto_select: false,
                    cancel_on_tap_outside: true
                });

                window.google.accounts.id.renderButton(container, {
                    theme: 'outline',
                    size: 'large',
                    type: 'standard',
                    text: 'signup_with',
                    shape: 'rectangular',
                    width: 280
                });

                googleSignupInitialized = true;
                noteEl.textContent = '';
            } catch (error) {
                console.error('Google signup init error:', error);
                noteEl.textContent = 'Gagal memuat Google Sign up. Coba lagi nanti.';
            }
        }

        async function handleGoogleSignupResponse(response) {
            const credential = response && response.credential ? response.credential : '';
            if (!credential) {
                alert('Google credential tidak valid. Coba lagi.');
                return;
            }

            const bimLevel = document.getElementById('bim-level').value;
            const jobRole = document.getElementById('job-role').value.trim();
            const organization = document.getElementById('organization').value.trim();

            if (!bimLevel) {
                alert('Pilih BIM Experience Level terlebih dahulu sebelum Sign up with Google.');
                return;
            }

            try {
                const res = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'signup',
                        idToken: credential,
                        bimLevel,
                        jobRole: jobRole || null,
                        organization: organization || null
                    })
                });

                const data = await res.json();

                if (!res.ok || !data.success || !data.token) {
                    alert(data.error || 'Sign up with Google gagal.');
                    return;
                }

                const normalizedUser = {
                    name: data.name || data.username || 'Google User',
                    email: data.email || '',
                    role: data.role || 'BIM Specialist',
                    photo: data.photo || data.profileImage || '/img/user-default.png',
                    token: data.token
                };

                if (typeof setUserData === 'function') {
                    setUserData(normalizedUser);
                } else {
                    localStorage.setItem('user', JSON.stringify(normalizedUser));
                    localStorage.setItem('username', normalizedUser.name);
                    localStorage.setItem('email', normalizedUser.email);
                    localStorage.setItem('role', normalizedUser.role);
                    localStorage.setItem('userimg', normalizedUser.photo);
                    localStorage.setItem('token', normalizedUser.token);
                }

                localStorage.setItem('userData', JSON.stringify({
                    name: normalizedUser.name,
                    email: normalizedUser.email,
                    level: data.bimLevel || bimLevel,
                    role: normalizedUser.role,
                    organization: data.organization || organization || ''
                }));

                alert(data.message || 'Sign up with Google berhasil.');
                window.location.href = '/elearning-assets/dashboard.html';
            } catch (error) {
                console.error('Google signup error:', error);
                alert('Gagal terhubung ke server saat Sign up with Google.');
            }
        }

        document.addEventListener('DOMContentLoaded', initGoogleSignup);
    </script>



</body>

</html>
