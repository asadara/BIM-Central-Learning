<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password Admin | BCL</title>
    <link rel="icon" href="/img/icons/trimmed/main_ico_bcl.ico" type="image/x-icon">
    <link href="../../css/bootstrap.min.css" rel="stylesheet">
    <link href="../../css/admin.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f3f4f6;
            padding: 24px;
        }

        .reset-card {
            width: min(100%, 520px);
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.14);
            padding: 32px;
        }

        .brand-mark {
            width: 64px;
            height: 64px;
            object-fit: contain;
            display: block;
            margin: 0 auto 16px;
        }
    </style>
</head>

<body>
    <main class="reset-card">
        <img src="../../logos/fav_logo_BCL.png" alt="BCL" class="brand-mark">
        <h1 class="h3 text-center mb-2">Reset Password Admin</h1>
        <p class="text-muted text-center mb-4">Masukkan password admin baru untuk menyelesaikan recovery.</p>

        <div id="reset-alert" class="alert d-none" role="alert"></div>

        <form id="admin-reset-form">
            <div class="mb-3">
                <label for="newPassword" class="form-label fw-semibold">Password Baru</label>
                <input type="password" class="form-control" id="newPassword" autocomplete="new-password" minlength="8" required>
                <div class="form-text">Minimal 8 karakter.</div>
            </div>

            <div class="mb-4">
                <label for="confirmPassword" class="form-label fw-semibold">Konfirmasi Password Baru</label>
                <input type="password" class="form-control" id="confirmPassword" autocomplete="new-password" minlength="8" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2" id="reset-submit">
                Reset Password
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="/pages/sub/adminbcl.html">Kembali ke Panel Admin</a>
        </div>
    </main>

    <script>
        (() => {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token') || '';
            const form = document.getElementById('admin-reset-form');
            const alertBox = document.getElementById('reset-alert');
            const submitButton = document.getElementById('reset-submit');

            function showAlert(message, type) {
                alertBox.textContent = message;
                alertBox.className = `alert alert-${type}`;
            }

            if (!token) {
                showAlert('Link recovery tidak valid atau token tidak ditemukan.', 'danger');
                submitButton.disabled = true;
                return;
            }

            form.addEventListener('submit', async (event) => {
                event.preventDefault();

                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (newPassword.length < 8) {
                    showAlert('Password baru minimal 8 karakter.', 'warning');
                    return;
                }

                if (newPassword !== confirmPassword) {
                    showAlert('Konfirmasi password tidak sama.', 'warning');
                    return;
                }

                submitButton.disabled = true;
                submitButton.textContent = 'Memproses...';

                try {
                    const response = await fetch('/api/admin/password-recovery/reset', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ token, newPassword, confirmPassword })
                    });
                    const result = await response.json().catch(() => ({}));

                    if (!response.ok || !result.success) {
                        showAlert(result.error || 'Reset password gagal.', 'danger');
                        return;
                    }

                    showAlert('Password berhasil direset. Silakan login dengan password baru.', 'success');
                    form.reset();
                    submitButton.disabled = true;
                    setTimeout(() => {
                        window.location.href = '/pages/sub/adminbcl.html';
                    }, 1800);
                } catch (error) {
                    showAlert('Koneksi ke server gagal. Coba lagi.', 'danger');
                } finally {
                    if (!alertBox.classList.contains('alert-success')) {
                        submitButton.disabled = false;
                        submitButton.textContent = 'Reset Password';
                    }
                }
            });
        })();
    </script>
</body>

</html>
