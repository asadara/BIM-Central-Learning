<head>

    <link rel="preconnect" href="//fonts.googleapis.com">

    <link href="//cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="../css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="../css/style.css" rel="stylesheet">

    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">

    <style>
        #loadingSpinner {
            transition: opacity 0.3s ease;
        }

        /* Responsive Video Card Grid */
        #videoContainer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }

        /* Video card styling */
        .video-card {
            display: block !important;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
            width: 100%;
            margin: 0;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        /* Override Bootstrap card styling */
        .video-card .card {
            border: none !important;
            border-radius: 12px !important;
            box-shadow: none !important;
            display: flex !important;
            flex-direction: column !important;
            height: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        .video-card .video-thumbnail {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px 12px 0 0;
        }

        .video-card .video-info {
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .video-card .video-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin: 0;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-card .video-size,
        .video-card .view-count {
            font-size: 12px;
            color: #666;
            margin: 0;
        }

        .video-card .view-count {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Responsive breakpoints */
        @media (max-width: 1200px) {
            #videoContainer {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 18px;
            }
        }

        @media (max-width: 992px) {
            #videoContainer {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 16px;
            }
        }

        @media (max-width: 768px) {
            #videoContainer {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 14px;
                padding: 15px 0;
            }

            .video-card .video-thumbnail {
                height: 160px;
            }

            .video-card .video-info {
                padding: 12px;
            }
        }

        @media (max-width: 576px) {
            #videoContainer {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 12px;
                padding: 10px 0;
            }

            .video-card .video-thumbnail {
                height: 140px;
            }

            .video-card .video-info {
                padding: 10px;
            }

            .video-card .video-title {
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            #videoContainer {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .video-card .video-thumbnail {
                height: 160px;
            }
        }
    </style>

</head>

<body>


    <div id="loadingSpinner" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%);
z-index:9999;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <script src="../js/user.js" defer></script>

    <!-- Navbar Start -->
    <div id="navbar-container"></div>
    <!-- Navbar End -->

    <div class="container text-center my-3">
        <h1 class="text-center" style="margin-top: -40px !important; margin-bottom: 20px !important;">Video Tutorial
            BIM</h1>

        <!-- Combined Filter Row -->
        <div class="d-flex justify-content-center align-items-center gap-2 mb-4 flex-wrap">
            <button id="backButton" class="btn btn-secondary" onclick="goBack()" style="display: none;">⬆
                Kembali</button>
            <input type="text" id="searchInput" class="form-control" style="max-width: 300px;"
                placeholder="Filter Video File..." onkeyup="searchAndFilter()">

            <!-- Dropdown Filter Ukuran -->
            <select id="sizeFilter" class="form-select" style="max-width: 200px;" onchange="searchAndFilter()">
                <option value="all">Semua Ukuran</option>
                <option value="small">Kecil (≤50MB)</option>
                <option value="medium">Sedang (50MB - 200MB)</option>
                <option value="large">Besar (200MB - 750MB)</option>
                <option value="extra">Extra Size (>1GB)</option>
            </select>

            <button class="btn btn-primary" style="white-space: nowrap;" onclick="searchAndFilter()">🔍 Cari</button>

            <!-- Tag Search Filter -->
            <input type="text" id="tagSearchInput" class="form-control" style="max-width: 300px;"
                placeholder="Search by tags (revit, bim)..." onkeyup="searchAndFilter()">

            <button class="btn btn-warning" style="white-space: nowrap;" onclick="clearAllFilters()">✖️ Clear</button>

            <button id="refreshThumbsBtn" class="btn btn-info text-white" style="display: none; white-space: nowrap;" onclick="regenerateThumbnails()">
                <i class="fas fa-sync-alt me-1"></i> Refresh Thumbs
            </button>

            <span> Urutkan: </span>
            <select id="sortFilter" class="form-select" style="max-width: 240px;" onchange="sortVideos()">
                <option value="views-desc">Most Viewed 🔥</option>
                <option value="views-asc">Least Viewed</option>
                <option value="name-asc">Nama (A-Z)</option>
                <option value="name-desc">Nama (Z-A)</option>
                <option value="size-asc">Ukuran (Kecil → Besar)</option>
                <option value="size-desc">Ukuran (Besar → Kecil)</option>
            </select>
        </div>


        <!-- Tambahkan modal di dalam HTML -->
        <div id="videoModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <video id="previewVideo" controls autoplay></video>
            </div>
        </div>

        <!-- Fullscreen Video Container -->
        <div id="fullscreenVideoContainer"
            style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; padding: 20px;">
            <video id="fullscreenVideo" style="width: 100%; height: 100%; object-fit: contain;" controls
                autoplay></video>
            <button onclick="document.getElementById('fullscreenVideoContainer').style.display='none'"
                style="position: absolute; top: 20px; right: 20px; background: rgba(255,0,0,0.7); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; z-index: 10001;">✕
                Tutup</button>
        </div>

        <!-- Inline Video Container (Floating) -->
        <div id="inlineVideoContainer"
            style="display: none; position: fixed; bottom: 20px; right: 20px; width: 450px; height: 300px; background: white; border: 2px solid #007bff; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 9999; overflow: hidden; font-family: Arial, sans-serif;">
            <video id="inlineVideo" style="width: 100%; height: 100%; object-fit: contain; background: black;" controls
                autoplay></video>
            <button onclick="document.getElementById('inlineVideoContainer').style.display='none'"
                style="position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.7); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 18px; font-weight: bold; z-index: 10001;">✕</button>
        </div>

        <!-- Tag Editor Modal -->
        <div id="tagEditorModal"
            style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; align-items: center; justify-content: center;">
            <div
                style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); max-width: 500px; width: 90%;">
                <h4 style="margin-top: 0;">Edit Tags for: <span id="tagEditorTitle" style="color: #007bff;"></span></h4>
                <p style="color: #666; font-size: 13px;">Add tags/hashtags separated by comma. Example: revit, bim,
                    tutorial</p>

                <textarea id="tagEditorInput"
                    style="width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-family: Arial; font-size: 13px;"
                    placeholder="Enter tags separated by comma..."></textarea>

                <div style="margin-top: 15px; display: flex; gap: 10px;">
                    <button onclick="saveVideoTags()"
                        style="flex: 1; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
                        <i class="fas fa-save"></i> Save Tags
                    </button>
                    <button onclick="closeTagEditor()"
                        style="flex: 1; padding: 10px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                </div>

                <div style="margin-top: 15px; padding: 10px; background: #f8f9fa; border-radius: 4px;">
                    <small style="color: #666;">Current tags: <span id="currentTagsDisplay"
                            style="color: #007bff;"></span></small>
                </div>
            </div>
        </div>


        <div class="container">
            <p id="searchResults" class="text-center">Hasil Pencarian ditemukan: 0 file(s)</p>
        </div>

        <!-- Daftar Video -->
        <div id="videoContainer" class="video-container"></div>

        <!-- API FRONTEND -->
        <script src="../js/tutorials.js"></script>

        <!-- Footer Start -->
        <div id="footer-container"></div>
        <!-- Footer End -->

        <!-- Back to Top -->
        <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>

        <!-- JavaScript Libraries -->
        <script src="//code.jquery.com/jquery-3.6.0.min.js"></script>
        <script src="//code.jquery.com/jquery-3.4.1.min.js"></script>
        <script src="//cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../lib/wow/wow.min.js"></script>
        <script src="../lib/easing/easing.min.js"></script>
        <script src="../lib/waypoints/waypoints.min.js"></script>
        <script src="../lib/owlcarousel/owl.carousel.min.js"></script>

        <script src="../js/script.js"></script>
        <script src="../js/loadComponents.js"></script>

        <link href="//cdnjs.cloudflare.com/ajax/libs/video.js/7.14.3/video-js.min.css" rel="stylesheet">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/7.14.3/video.min.js"></script>


</body>
