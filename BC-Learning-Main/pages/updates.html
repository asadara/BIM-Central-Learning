<!doctype html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Berita dan update terkurasi tentang BIM, standar informasi, dan konstruksi digital.">
  <title>Berita & Update BIM | BCL</title>

  <link rel="icon" href="/img/icons/trimmed/main_ico_bcl.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
  <link href="../css/news-updates.css?v=20260717d" rel="stylesheet">
</head>

<body class="news-updates-page">
  <div id="navbar-container"></div>

  <main>
    <header class="newsroom-masthead" aria-labelledby="updates-title">
      <div class="container newsroom-masthead__inner">
        <div class="newsroom-title-block">
          <p class="newsroom-edition"><span aria-hidden="true"></span>BCL Newsroom</p>
          <h1 id="updates-title">Berita & Perkembangan</h1>
          <p>Informasi terkurasi untuk BIM, standar informasi, dan transformasi digital konstruksi.</p>
        </div>
        <div class="newsroom-feed-info" aria-live="polite">
          <p class="newsroom-feed-info__label"><i class="fa-solid fa-satellite-dish" aria-hidden="true"></i> Status feed</p>
          <p id="feed-status">Menghubungkan sumber berita...</p>
          <small>Topik eksternal dibatasi: BIM, ISO 19650, CDE/IFC, openBIM, digital twin, dan teknologi konstruksi.</small>
        </div>
      </div>
    </header>

    <section class="newsroom-toolbar" aria-label="Pencarian dan topik berita">
      <div class="container newsroom-toolbar__inner">
        <label class="news-search" for="searchInput">
          <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
          <span class="visually-hidden">Cari berita</span>
          <input type="search" id="searchInput" placeholder="Cari judul, topik, atau sumber..." autocomplete="off">
        </label>
        <button id="reset-btn" class="news-reset-btn" type="button">
          <i class="fa-solid fa-arrow-rotate-left" aria-hidden="true"></i>Reset
        </button>
        <div class="filter-buttons" role="group" aria-label="Topik berita">
          <button class="filter-btn active" type="button" data-filter="all" aria-pressed="true">Semua</button>
          <button class="filter-btn" type="button" data-filter="bim" aria-pressed="false">BIM</button>
          <button class="filter-btn" type="button" data-filter="construction" aria-pressed="false">Konstruksi</button>
          <button class="filter-btn" type="button" data-filter="technology" aria-pressed="false">Teknologi</button>
          <button class="filter-btn" type="button" data-filter="regulation" aria-pressed="false">Regulasi</button>
          <button class="filter-btn" type="button" data-filter="infrastructure" aria-pressed="false">Infrastruktur</button>
          <button class="filter-btn" type="button" data-filter="education" aria-pressed="false">Edukasi</button>
        </div>
        <div id="searchResults" class="news-results-summary" aria-live="polite"></div>
      </div>
    </section>

    <section class="newsroom-content" aria-labelledby="latest-news-title">
      <div class="container">
        <div id="featured-articles" class="featured-news" aria-live="polite"></div>

        <div class="newsroom-section-heading">
          <div>
            <p class="newsroom-section-heading__eyebrow">Arsip terkini</p>
            <h2 id="latest-news-title">Semua berita</h2>
          </div>
          <p id="news-count" class="news-count" aria-live="polite"></p>
        </div>

        <div class="news-list" id="news-container" aria-live="polite"></div>

        <div class="load-more-wrap" id="load-more-container">
          <button id="load-more-btn" class="news-load-more" type="button" hidden>
            Muat berita lainnya <i class="fa-solid fa-arrow-down" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-container"></div>
  <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top" aria-label="Kembali ke atas"><i class="bi bi-arrow-up"></i></a>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/loadComponents.js"></script>
  <script src="../js/user.js"></script>
  <script src="../js/news.js?v=20260717d"></script>
</body>

</html>
