<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .result {
            background: #f5f5f5;
            padding: 10px;
            margin: 10px 0;
            border-left: 4px solid #007bff;
        }

        .error {
            border-left-color: #dc3545;
            background: #f8d7da;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>

<body>
    <h1>API Test - TOC Endpoint</h1>

    <button onclick="testTOC()">Test TOC API</button>
    <button onclick="testMaterials()">Test Materials API</button>

    <div id="results"></div>

    <script>
        function addResult(title, content, isError = false) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = 'result' + (isError ? ' error' : '');
            div.innerHTML = `<h3>${title}</h3><pre>${content}</pre>`;
            results.appendChild(div);
        }

        async function testTOC() {
            try {
                const response = await fetch('/api/learning-materials/toc/pemodelan-dan-produksi-data-bim');
                const data = await response.text();

                addResult(
                    `TOC API (${response.status})`,
                    `URL: /api/learning-materials/toc/pemodelan-dan-produksi-data-bim\nStatus: ${response.status}\nResponse: ${data}`,
                    !response.ok
                );
            } catch (error) {
                addResult('TOC API Error', `Error: ${error.message}`, true);
            }
        }

        async function testMaterials() {
            try {
                const response = await fetch('/api/learning-materials');
                const data = await response.text();

                addResult(
                    `Materials API (${response.status})`,
                    `URL: /api/learning-materials\nStatus: ${response.status}\nResponse: ${data}`,
                    !response.ok
                );
            } catch (error) {
                addResult('Materials API Error', `Error: ${error.message}`, true);
            }
        }
    </script>
</body>

</html>
