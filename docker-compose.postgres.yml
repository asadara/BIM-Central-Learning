services:
  postgres:
    image: postgres:15-alpine
    container_name: bcl-postgres
    environment:
      POSTGRES_DB: bcl_database
      POSTGRES_USER: bcl_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_2025}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
      - ./backups:/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bcl_user -d bcl_database"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bcl-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bcl-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bcl.nke.net
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bcl-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  bcl-network:
    driver: bridge
