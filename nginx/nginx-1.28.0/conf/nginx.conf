worker_processes auto;
pid logs/nginx.pid;

events {
    worker_connections 1024;
    # use epoll;  # Linux only - commented for Windows compatibility
    # multi_accept on;  # Linux only - commented for Windows compatibility
}

http {
    include mime.types;
    default_type application/octet-stream;

    # âœ… ABSOLUTE paths - fixed for current installation
    root C:/BCL/BC-Learning-Main;
    client_body_temp_path C:/BCL/nginx/nginx-1.28.0/temp/client_body_temp;
    proxy_temp_path C:/BCL/nginx/nginx-1.28.0/temp/proxy_temp;
    fastcgi_temp_path C:/BCL/nginx/nginx-1.28.0/temp/fastcgi_temp;
    uwsgi_temp_path C:/BCL/nginx/nginx-1.28.0/temp/uwsgi_temp;
    scgi_temp_path C:/BCL/nginx/nginx-1.28.0/temp/scgi_temp;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Rate limiting tuned for LAN media bursts (thumbnails + gallery loads).
    limit_req_zone $binary_remote_addr zone=api:20m rate=40r/s;
    limit_req_zone $binary_remote_addr zone=files:20m rate=200r/s;

    # Single server block untuk semua domain
    server {
        listen 80;
        listen [::]:80;
        server_name bcl.nke.net localhost 127.0.0.1 _;

        # âœ… RELATIVE logging - tidak hardcoded
        access_log logs/bcl_access.log combined buffer=32k flush=5m;
        error_log logs/bcl_error.log warn;

        # Disable HSTS untuk development
        add_header Strict-Transport-Security "" always;

        # Redirect HTTP ke HTTPS (disabled sementara karena HTTPS tidak responsif)
        # return 301 https://$host$request_uri;

        # Static files dengan cache optimization
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Robust-File-Serving "true";
            try_files $uri =404;
        }

        # PDF standards and other static documents
        location ^~ /data/ {
            alias C:/BCL/data/;
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        # API proxy ke backend
        location = /api/watermark {
            proxy_pass http://127.0.0.1:5052;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        location ^~ /api/bim-methode/file {
            limit_req zone=files burst=240;

            proxy_pass http://127.0.0.1:5052;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Stream large files directly to avoid temp-file pressure.
            proxy_request_buffering off;
            proxy_buffering off;

            proxy_connect_timeout 30s;
            proxy_send_timeout 900s;
            proxy_read_timeout 900s;
        }

        location ^~ /api/bim-methode/thumbnail/ {
            limit_req zone=files burst=400;

            proxy_pass http://127.0.0.1:5052;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        location ^~ /api/ {
            limit_req zone=api burst=120;

            proxy_pass http://127.0.0.1:5052;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Media proxy ke backend (PC-BIM02 + /media routes)
        location ^~ /media/ {
            limit_req zone=files burst=400;

            proxy_pass http://127.0.0.1:5052;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings (media can be large)
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Media proxy ke backend (PC-BIM sources)
        location ^~ /media-bim {
            limit_req zone=files burst=400;

            proxy_pass http://127.0.0.1:5052;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Thumbnails proxy ke backend (served from backend public/thumbnails)
        location ^~ /thumbnails/ {
            limit_req zone=files burst=400;

            proxy_pass http://127.0.0.1:5052;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Direct ping endpoint
        location /ping {
            proxy_pass http://127.0.0.1:5052;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Fallback untuk SPA routing
        location / {
            try_files $uri $uri/ /index.html;
            index index.html index.htm;

            # Cache control untuk HTML
            expires 1h;
            add_header Cache-Control "public, must-revalidate, proxy-revalidate";
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root html;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name bcl.nke.net localhost 127.0.0.1 _;

        ssl_certificate     C:/BCL/nginx/certs/bcl.nke.net.fullchain.crt;
        ssl_certificate_key C:/BCL/nginx/certs/bcl.nke.net.key;

        # âœ… RELATIVE logging - tidak hardcoded
        access_log logs/bcl_https_access.log combined buffer=32k flush=5m;
        error_log logs/bcl_https_error.log warn;

        # Disable HSTS untuk development
        add_header Strict-Transport-Security "" always;

        # Static files dengan cache optimization
