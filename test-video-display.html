<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Video Display System</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        #video-display-container { border: 2px solid #ccc; min-height: 200px; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Test Video Display System</h1>

    <button onclick="testAPIs()">Test All APIs</button>
    <button onclick="testVideoDisplayInit()">Test Video Display Init</button>
    <button onclick="clearResults()">Clear Results</button>

    <div id="results"></div>

    <div id="video-display-container">
        <h3>Video Display Container</h3>
        <div id="video-info-display" data-video-info-display></div>
    </div>

    <script src="/js/video-info-display.js"></script>

    <script>
        async function addResult(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
            results.appendChild(div);
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        async function testAPI(endpoint, description) {
            try {
                const response = await fetch(endpoint);
                if (response.ok) {
                    const data = await response.json();
                    await addResult(`${description}: ✅ (${data.length || 'OK'})`, 'success');
                    return data;
                } else {
                    await addResult(`${description}: ❌ ${response.status}`, 'error');
                    return null;
                }
            } catch (error) {
                await addResult(`${description}: ❌ ${error.message}`, 'error');
                return null;
            }
        }

        async function testAPIs() {
            await addResult('Starting API tests...', 'info');

            // Test all APIs used by video display system
            await testAPI('/api/video-display/selected', 'Video Display API');
            await testAPI('/api/news/all-news', 'News API');
            await testAPI('/api/users/get-all', 'Users API');
            await testAPI('/api/tutorials', 'Tutorials API');
            await testAPI('/api/courses', 'Courses API');

            await addResult('API tests completed', 'info');
        }

        async function testVideoDisplayInit() {
            await addResult('Testing Video Display System initialization...', 'info');

            try {
                // Check if container exists
                const container = document.getElementById('video-info-display');
                if (!container) {
                    await addResult('Video display container not found', 'error');
                    return;
                }

                await addResult('Container found, initializing system...', 'info');

                // Try to initialize manually
                if (window.videoInfoDisplay) {
                    await addResult('VideoInfoDisplay class available', 'success');

                    // Create new instance
                    const display = new window.VideoInfoDisplay({
                        containerId: 'video-info-display'
                    });

                    await addResult('VideoInfoDisplay instance created', 'success');

                    // Try to initialize
                    await display.init();
                    await addResult('VideoInfoDisplay initialized successfully!', 'success');

                } else {
                    await addResult('VideoInfoDisplay class not loaded', 'error');
                }

            } catch (error) {
                await addResult(`Video display init failed: ${error.message}`, 'error');
                console.error('Video display error:', error);
            }
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        // Auto-run basic tests on load
        window.addEventListener('load', async () => {
            await addResult('Page loaded, starting basic tests...', 'info');
            await testAPIs();
        });
    </script>
</body>
</html>
